name: Setup workspace
description: Install pnpm, Node.js, and workspace dependencies, optionally building and installing the isolated benchmark dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '24'
  build:
    description: Whether to run the workspace build (pnpm build).
    required: false
    default: 'true'
  benchmarks:
    description: Whether to install the isolated benchmark dependencies.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup PNPM
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install workspace dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build workspace
      if: ${{ inputs.build == 'true' }}
      shell: bash
      run: pnpm build

    - name: Install benchmark dependencies
      if: ${{ inputs.benchmarks == 'true' }}
      shell: bash
      run: pnpm --dir benchmarks install --ignore-workspace --lockfile=false --ignore-scripts
