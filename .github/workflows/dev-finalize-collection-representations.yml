name: Dev Finalize Collection Representations

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build && pnpm api:surface:update
      - name: Update public contracts and tree-shaking scenarios
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new))

          replace_once(
              'README.md',
              """Size validations preserve the collection and snapshot the observed `size` in failure payloads. `toSize()` replaces the collection with its numeric size. Set and Map membership follow SameValueZero equality.

          ## Composition
          """.replace('          ', ''),
              """Size validations preserve the collection and snapshot the observed `size` in failure payloads. `toSize()` replaces the collection with its numeric size. Set and Map membership follow SameValueZero equality.

          Collection representations remain explicit and preserve insertion order:

          ```ts
          tags.toArray() // string[]
          scores.toKeys() // string[]
          scores.toValues() // number[]
          scores.toEntries() // Array<[string, number]>
          ```

          These transformations return new arrays and do not mutate the source collection. Map-to-object conversion is intentionally not implied because it requires separate key, prototype, and collision policies.

          ## Composition
          """.replace('          ', ''),
          )

          replace_once(
              'packages/valchecker/README.md',
              """Map and Set schemas expose size-aware emptiness checks, `isSizeAtLeast()`, `isSizeAtMost()`, `isSizeExactly()`, and `toSize()`. Set membership uses `isIncluding()`, while Map membership is explicit through `isIncludingKey()` and `isIncludingValue()`.

          ## Step naming
          """.replace('          ', ''),
              """Map and Set schemas expose size-aware emptiness checks, `isSizeAtLeast()`, `isSizeAtMost()`, `isSizeExactly()`, and `toSize()`. Set membership uses `isIncluding()`, while Map membership is explicit through `isIncludingKey()` and `isIncludingValue()`.

          Use `toArray()` for Set items and `toKeys()`, `toValues()`, or `toEntries()` for explicit Map representations. Each transform returns a new insertion-ordered array and emits no new issue.

          ## Step naming
          """.replace('          ', ''),
          )

          replace_once(
              'CHANGELOG.md',
              """- Map and Set size/membership steps: size-aware `isEmpty()`/`isNotEmpty()`, `isSizeAtLeast()`, `isSizeAtMost()`, `isSizeExactly()`, `toSize()`, Set `isIncluding()`, and Map `isIncludingKey()`/`isIncludingValue()`.
          """.replace('          ', ''),
              """- Explicit collection representation transforms: Set `toArray()` and Map `toKeys()`, `toValues()`, and `toEntries()`.
          - Map and Set size/membership steps: size-aware `isEmpty()`/`isNotEmpty()`, `isSizeAtLeast()`, `isSizeAtMost()`, `isSizeExactly()`, `toSize()`, Set `isIncluding()`, and Map `isIncludingKey()`/`isIncludingValue()`.
          """.replace('          ', ''),
          )

          replace_once(
              'docs/guide/v1-contract.md',
              """Set membership uses `isIncluding(item)`. Map membership is explicit through `isIncludingKey(key)` and `isIncludingValue(value)`, avoiding key/value ambiguity. Membership uses SameValueZero semantics: `NaN` matches `NaN`, and `0` matches `-0`.

          ## Union semantics
          """.replace('          ', ''),
              """Set membership uses `isIncluding(item)`. Map membership is explicit through `isIncludingKey(key)` and `isIncludingValue(value)`, avoiding key/value ambiguity. Membership uses SameValueZero semantics: `NaN` matches `NaN`, and `0` matches `-0`.

          `toArray()` replaces a Set with a new item array. `toKeys()`, `toValues()`, and `toEntries()` replace a Map with new key, value, or mutable entry-tuple arrays. All four preserve insertion order, remain synchronous, add no issue, and do not mutate the source collection. Map-to-object conversion is outside this contract because it requires explicit key canonicalization, prototype, and collision policy.

          ## Union semantics
          """.replace('          ', ''),
          )

          replace_once(
              'docs/guide/v1-contract.md',
              """- `toLength()`, `toSize()`, `toString()`,
          """.replace('          ', ''),
              """- `toLength()`, `toSize()`, `toArray()`, `toKeys()`, `toValues()`, `toEntries()`, `toString()`,
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\tscenario('valchecker-collection-capabilities', 'Valchecker', 'Selective collection size and membership', 'Collection capability isolation', `
          import { createValchecker, isIncluding, isIncludingKey, isIncludingValue, isSizeAtLeast, isSizeAtMost, isSizeExactly, map, number, set, string, toSize } from 'valchecker'
          const v = createValchecker({ steps: [isIncluding, isIncludingKey, isIncludingValue, isSizeAtLeast, isSizeAtMost, isSizeExactly, map, number, set, string, toSize] })
          export const result = {
          \tmap: v.map({ key: v.string(), value: v.number() }).isSizeAtLeast(1).isIncludingKey('a').isIncludingValue(1).toSize().execute(new Map([['a', 1]])),
          \tset: v.set(v.string()).isSizeAtMost(2).isSizeExactly(1).isIncluding('a').execute(new Set(['a'])),
          }
          `, {
          \t\trequiredMarkers: ['isSizeAtLeast:expected_size_at_least', 'isSizeAtMost:expected_size_at_most', 'isSizeExactly:expected_size_exactly', 'isIncludingKey:expected_including_key', 'isIncludingValue:expected_including_value'],
          \t}),
          \t...[
          """.replace('          ', ''),
              """\tscenario('valchecker-collection-capabilities', 'Valchecker', 'Selective collection size and membership', 'Collection capability isolation', `
          import { createValchecker, isIncluding, isIncludingKey, isIncludingValue, isSizeAtLeast, isSizeAtMost, isSizeExactly, map, number, set, string, toSize } from 'valchecker'
          const v = createValchecker({ steps: [isIncluding, isIncludingKey, isIncludingValue, isSizeAtLeast, isSizeAtMost, isSizeExactly, map, number, set, string, toSize] })
          export const result = {
          \tmap: v.map({ key: v.string(), value: v.number() }).isSizeAtLeast(1).isIncludingKey('a').isIncludingValue(1).toSize().execute(new Map([['a', 1]])),
          \tset: v.set(v.string()).isSizeAtMost(2).isSizeExactly(1).isIncluding('a').execute(new Set(['a'])),
          }
          `, {
          \t\trequiredMarkers: ['isSizeAtLeast:expected_size_at_least', 'isSizeAtMost:expected_size_at_most', 'isSizeExactly:expected_size_exactly', 'isIncludingKey:expected_including_key', 'isIncludingValue:expected_including_value'],
          \t}),
          \tscenario('valchecker-collection-representations-free', 'Valchecker', 'Collections without representation transforms', 'Collection representation isolation', `
          import { createValchecker, map, number, set, string } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string] })
          export const result = {
          \tmap: v.map({ key: v.string(), value: v.number() }).execute(new Map([['a', 1]])),
          \tset: v.set(v.string()).execute(new Set(['a'])),
          }
          `, {
          \t\tforbiddenMarkers: ['toArray', 'toKeys', 'toValues', 'toEntries'],
          \t}),
          \tscenario('valchecker-collection-representations', 'Valchecker', 'Selective collection representations', 'Collection representation isolation', `
          import { createValchecker, map, number, set, string, toArray, toEntries, toKeys, toValues } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string, toArray, toEntries, toKeys, toValues] })
          export const result = {
          \titems: v.set(v.string()).toArray().execute(new Set(['a'])),
          \tkeys: v.map({ key: v.string(), value: v.number() }).toKeys().execute(new Map([['a', 1]])),
          \tvalues: v.map({ key: v.string(), value: v.number() }).toValues().execute(new Map([['a', 1]])),
          \tentries: v.map({ key: v.string(), value: v.number() }).toEntries().execute(new Map([['a', 1]])),
          }
          `, {
          \t\trequiredMarkers: ['toArray', 'toKeys', 'toValues', 'toEntries'],
          \t}),
          \t...[
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\tconst collectionCapabilitiesFree = byId(results, 'valchecker-collection-capabilities-free')
          \tconst collectionCapabilities = byId(results, 'valchecker-collection-capabilities')
          \tconst comparisons = [
          """.replace('          ', ''),
              """\tconst collectionCapabilitiesFree = byId(results, 'valchecker-collection-capabilities-free')
          \tconst collectionCapabilities = byId(results, 'valchecker-collection-capabilities')
          \tconst collectionRepresentationsFree = byId(results, 'valchecker-collection-representations-free')
          \tconst collectionRepresentations = byId(results, 'valchecker-collection-representations')
          \tconst comparisons = [
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\tconst collectionCapabilityMarkersAbsent = collectionCapabilitiesFree.retainedForbiddenMarkers.length === 0
          \tconst collectionCapabilityMarkersPresent = collectionCapabilities.retainedRequiredMarkers.length === collectionCapabilities.requiredMarkers.length
          \tconst checks = [
          """.replace('          ', ''),
              """\tconst collectionCapabilityMarkersAbsent = collectionCapabilitiesFree.retainedForbiddenMarkers.length === 0
          \tconst collectionCapabilityMarkersPresent = collectionCapabilities.retainedRequiredMarkers.length === collectionCapabilities.requiredMarkers.length
          \tconst collectionRepresentationMarkersAbsent = collectionRepresentationsFree.retainedForbiddenMarkers.length === 0
          \tconst collectionRepresentationMarkersPresent = collectionRepresentations.retainedRequiredMarkers.length === collectionRepresentations.requiredMarkers.length
          \tconst checks = [
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\t\t{ name: 'Selective collection size/membership retains every issue marker', passed: collectionCapabilityMarkersPresent, value: collectionCapabilityMarkersPresent ? collectionCapabilities.retainedRequiredMarkers.join(', ') : `${collectionCapabilities.retainedRequiredMarkers.length}/${collectionCapabilities.requiredMarkers.length} retained` },
          \t]
          """.replace('          ', ''),
              """\t\t{ name: 'Selective collection size/membership retains every issue marker', passed: collectionCapabilityMarkersPresent, value: collectionCapabilityMarkersPresent ? collectionCapabilities.retainedRequiredMarkers.join(', ') : `${collectionCapabilities.retainedRequiredMarkers.length}/${collectionCapabilities.requiredMarkers.length} retained` },
          \t\t{ name: 'Collections without representation transforms exclude their method markers', passed: collectionRepresentationMarkersAbsent, value: collectionRepresentationMarkersAbsent ? 'none retained' : collectionRepresentationsFree.retainedForbiddenMarkers.join(', ') },
          \t\t{ name: 'Selective collection representations retain every method marker', passed: collectionRepresentationMarkersPresent, value: collectionRepresentationMarkersPresent ? collectionRepresentations.retainedRequiredMarkers.join(', ') : `${collectionRepresentations.retainedRequiredMarkers.length}/${collectionRepresentations.requiredMarkers.length} retained` },
          \t]
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation', 'Collection capability isolation', 'Full-library reference']
          """.replace('          ', ''),
              """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation', 'Collection capability isolation', 'Collection representation isolation', 'Full-library reference']
          """.replace('          ', ''),
          )
          PY
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add api-surface.json README.md packages/valchecker/README.md CHANGELOG.md docs/guide/v1-contract.md benchmarks/src/treeshake.mjs
          git commit --no-verify -m 'docs: finalize collection representation contracts'
          git push origin HEAD:${{ github.head_ref }}
