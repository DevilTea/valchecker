name: Agent apply PR B snapshot fixes

on:
  push:
    branches:
      - agent/structural-combinator-failure-semantics
    paths:
      - .github/workflows/agent-apply-prb-fix3.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structural-combinator-failure-semantics
          fetch-depth: 0

      - name: Apply snapshot and provenance fixes
        shell: bash
        run: |
          printf '%s  %s\n' \
            '279c0408d218d4be30e1cf3c68f2524c0fba28372593d6894c4cda28002f9502' \
            '.github/agent/prb-fix3.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode .github/agent/prb-fix3.patch.gz.b64 > /tmp/prb-fix3.patch.gz
          gunzip -c /tmp/prb-fix3.patch.gz > /tmp/prb-fix3.patch
          printf '%s  %s\n' \
            '0f551c3c726c3f0ee2a1a233ce041b42cb0f78fde3c4c1173a2402e3c7ae0f30' \
            '/tmp/prb-fix3.patch' \
            | sha256sum --check --strict
          git apply --index /tmp/prb-fix3.patch
          rm -f \
            .github/agent/prb-fix3.patch.gz.b64 \
            .github/workflows/agent-apply-prb-fix3.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: snapshot fallback issues and preserve accessor semantics'
          git push origin HEAD:agent/structural-combinator-failure-semantics
