name: Dev Apply Shared Context Fix

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Share step composition context across immutable chains
        shell: bash
        run: |
          git apply --check .github/dev-core-context.patch
          git apply .github/dev-core-context.patch
          rm -f .github/dev-core-context.patch
          rm -f .github/workflows/dev-apply-core-context.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'perf: share step composition context across chains'
          git push origin HEAD:${{ github.head_ref }}
