name: Dev Source Snapshot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: dev-source-${{ github.event.pull_request.number }}
          path: .
          include-hidden-files: true
          retention-days: 1
