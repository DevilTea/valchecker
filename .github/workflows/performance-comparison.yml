name: Performance Comparison
run-name: Performance comparison ${{ inputs.profile }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Sampling profile
        required: true
        default: standard
        type: choice
        options:
          - smoke
          - standard
          - full
      adapters:
        description: Comma-separated adapters
        required: true
        default: valchecker,zod3,zod4,zod4-jitless,valibot
        type: string
      seed:
        description: Optional deterministic execution-order seed
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: performance-comparison-${{ github.ref }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      BENCHMARK_MODE: ${{ inputs.profile }}
      BENCHMARK_ADAPTERS: ${{ inputs.adapters }}
      REQUESTED_SEED: ${{ inputs.seed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          benchmarks: 'true'

      - name: Verify All Benchmark Scenarios
        run: pnpm --dir benchmarks verify

      - name: Run Benchmark
        shell: bash
        run: |
          seed="$REQUESTED_SEED"
          if [[ -z "$seed" ]]; then
            seed="${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fi
          mkdir -p artifacts/performance-comparison
          pnpm --dir benchmarks bench \
            --mode "$BENCHMARK_MODE" \
            --adapters "$BENCHMARK_ADAPTERS" \
            --seed "$seed" \
            --output ../artifacts/performance-comparison/raw.json

      - name: Generate Reports
        run: pnpm --dir benchmarks report --input ../artifacts/performance-comparison/raw.json --markdown ../artifacts/performance-comparison/report.md --html ../artifacts/performance-comparison/report.html

      - name: Publish Job Summary
        shell: bash
        run: cat artifacts/performance-comparison/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Benchmark Reports
        if: always() && hashFiles('artifacts/performance-comparison/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: performance-comparison-${{ inputs.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/performance-comparison
          if-no-files-found: error
          retention-days: 90
