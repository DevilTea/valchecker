name: Bundle Size Impact
run-name: Bundle size impact report by @${{ github.actor }}

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/bundle-size-impact.yml
      - .github/actions/setup/action.yml
      - 'benchmarks/**'
      - 'packages/**'
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

permissions:
  contents: read

concurrency:
  group: bundle-size-impact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      REPORT_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          benchmarks: 'true'

      - name: Generate Bundle Size Report
        run: pnpm --dir benchmarks treeshake --output ../artifacts/bundle-size-impact

      - name: Publish Job Summary
        if: always() && hashFiles('artifacts/bundle-size-impact/summary.md') != ''
        shell: bash
        run: cat artifacts/bundle-size-impact/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Bundle Size Report
        if: always() && hashFiles('artifacts/bundle-size-impact/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-size-impact-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/bundle-size-impact
          if-no-files-found: error
          retention-days: 90
