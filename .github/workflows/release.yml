name: Publish to npm
run-name: Publish ${{ inputs.version }} to npm tag ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version already committed to all package manifests
        required: true
        type: string
      tag:
        description: npm distribution tag
        required: true
        default: next
        type: choice
        options:
          - next
          - latest
      confirmation:
        description: Type “publish <version> to <tag>” exactly
        required: true
        type: string

permissions: {}

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      NPM_TAG: ${{ inputs.tag }}
      PUBLISH_CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup npm for Trusted Publishing
        run: npm install --global npm@11.5.1

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Release Candidate
        run: pnpm release:validate

      - name: Prepare Immutable Tarballs
        run: pnpm release:prepare

      - name: Upload Prepared Tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-release-${{ inputs.version }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/release
          if-no-files-found: error
          retention-days: 90

      - name: Publish Prepared Tarballs
        run: pnpm release:publish
