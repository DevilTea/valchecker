name: Benchmark
run-name: Benchmark ${{ inputs.profile }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Sampling profile
        required: true
        default: standard
        type: choice
        options:
          - smoke
          - standard
          - full
      adapters:
        description: Comma-separated adapters
        required: true
        default: valchecker,zod3,zod4,zod4-jitless,valibot
        type: string
      seed:
        description: Optional deterministic execution-order seed
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      BENCHMARK_MODE: ${{ inputs.profile }}
      BENCHMARK_ADAPTERS: ${{ inputs.adapters }}
      REQUESTED_SEED: ${{ inputs.seed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Valchecker
        run: pnpm build

      - name: Install Benchmark Dependencies
        run: pnpm --dir benchmarks install --ignore-workspace --lockfile=false --ignore-scripts

      - name: Verify All Benchmark Scenarios
        run: pnpm --dir benchmarks verify

      - name: Run Benchmark
        shell: bash
        run: |
          seed="$REQUESTED_SEED"
          if [[ -z "$seed" ]]; then
            seed="${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fi
          mkdir -p artifacts/benchmark
          pnpm --dir benchmarks bench \
            --mode "$BENCHMARK_MODE" \
            --adapters "$BENCHMARK_ADAPTERS" \
            --seed "$seed" \
            --output ../artifacts/benchmark/raw.json

      - name: Generate Reports
        run: pnpm --dir benchmarks report --input ../artifacts/benchmark/raw.json --markdown ../artifacts/benchmark/report.md --html ../artifacts/benchmark/report.html

      - name: Publish Job Summary
        shell: bash
        run: cat artifacts/benchmark/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Benchmark Reports
        if: always() && hashFiles('artifacts/benchmark/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-${{ inputs.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/benchmark
          if-no-files-found: error
          retention-days: 90
