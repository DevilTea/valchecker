name: Agent Phase C Map Simplify

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/execution-effect-metadata'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Simplify direct Map traversal to proven identity keys
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('packages/internal/src/steps/map/map.ts')
          text = path.read_text()

          def replace(old: str, new: str, count: int = 1) -> None:
              global text
              actual = text.count(old)
              if actual != count:
                  raise RuntimeError(f'expected {count} matches, found {actual}: {old[:100]!r}')
              text = text.replace(old, new)

          replace(
              """\t\tconst childrenAreDirectSafe = childrenAreSynchronous\n\t\t\t&& keyEffects.parentTraversal === 'direct-safe'\n\t\t\t&& valueEffects.parentTraversal === 'direct-safe'\n\t\tconst keyIsIdentityPreserving = keyEffects.identity === 'identity-preserving'\n""",
              """\t\tconst childrenAreDirectSafe = childrenAreSynchronous\n\t\t\t&& keyEffects.identity === 'identity-preserving'\n\t\t\t&& keyEffects.parentTraversal === 'direct-safe'\n\t\t\t&& valueEffects.parentTraversal === 'direct-safe'\n""",
          )

          replace(
              """\t\t\tlet output: Map<unknown, unknown> | undefined\n\t\t\tlet firstKeyIndex: Map<unknown, number> | undefined\n\t\t\tconst sourceKeys: unknown[] | undefined = keyIsIdentityPreserving ? undefined : []\n\t\t\tlet issues: AnyExecutionIssue[] | undefined\n""",
              """\t\t\tlet output: Map<unknown, unknown> | undefined\n\t\t\tlet issues: AnyExecutionIssue[] | undefined\n""",
          )

          replace("\t\t\t\tsourceKeys?.push(sourceKey)\n", "")

          replace(
              """\t\t\t\tif (!keyFailed && !valueFailed) {\n\t\t\t\t\tconst transformedKey = keyIsIdentityPreserving ? sourceKey : keyResult.value\n\t\t\t\t\tif (!keyIsIdentityPreserving && output?.has(transformedKey)) {\n\t\t\t\t\t\tconst firstIndex = firstKeyIndex!.get(transformedKey)\n\t\t\t\t\t\tif (firstIndex == null)\n\t\t\t\t\t\t\tthrow new Error('Missing transformed Map key metadata.')\n\t\t\t\t\t\tconst target = issues ??= []\n\t\t\t\t\t\ttarget.push(createDuplicateIssue(\n\t\t\t\t\t\t\tvalue,\n\t\t\t\t\t\t\tsourceKeys![firstIndex],\n\t\t\t\t\t\t\tfirstIndex,\n\t\t\t\t\t\t\tsourceKey,\n\t\t\t\t\t\t\tindex,\n\t\t\t\t\t\t\ttransformedKey,\n\t\t\t\t\t\t))\n\t\t\t\t\t\tif (!collectAllIssues)\n\t\t\t\t\t\t\treturn failure(target)\n\t\t\t\t\t}\n\t\t\t\t\telse {\n\t\t\t\t\t\toutput ??= new Map()\n\t\t\t\t\t\toutput.set(\n\t\t\t\t\t\t\ttransformedKey,\n\t\t\t\t\t\t\tvalueIsIdentityPreserving ? sourceValue : valueResult.value,\n\t\t\t\t\t\t)\n\t\t\t\t\t\tif (!keyIsIdentityPreserving) {\n\t\t\t\t\t\t\tfirstKeyIndex ??= new Map()\n\t\t\t\t\t\t\tfirstKeyIndex.set(transformedKey, index)\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n""",
              """\t\t\t\tif (!keyFailed && !valueFailed) {\n\t\t\t\t\toutput ??= new Map()\n\t\t\t\t\toutput.set(\n\t\t\t\t\t\tsourceKey,\n\t\t\t\t\t\tvalueIsIdentityPreserving ? sourceValue : valueResult.value,\n\t\t\t\t\t)\n\t\t\t\t}\n""",
          )

          path.write_text(text)
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/agent-phase-c-map-simplify.yml
          git add packages/internal/src/steps/map/map.ts
          git commit -m "refactor: limit direct Map traversal to identity keys"
          git push