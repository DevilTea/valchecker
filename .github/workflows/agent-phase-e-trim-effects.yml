name: Agent Phase E Trim Effects

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/execution-effect-metadata'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Trim unused output effects
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          def read(path: str) -> str:
              return Path(path).read_text()

          def write(path: str, text: str) -> None:
              Path(path).write_text(text)
              print(f'updated {path}')

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected one replacement, found {count}')
              return text.replace(old, new, 1)

          path = 'packages/internal/src/core/core.ts'
          text = read(path)
          text = replace_once(
              text,
              """\t\tget: (target: any, p: PropertyKey, receiver: any) => {\n\t\t\tif (p === executionEffectsKey)\n\t\t\t\treturn executionEffects\n\t\t\tif (Object.hasOwn(stepMethods, p) === false)\n\t\t\t\treturn Reflect.get(target, p, receiver)\n\n\t\t\tconst registeredStepMethod = stepMethods[p]!\n""",
              """\t\tget: (target: any, p: PropertyKey, receiver: any) => {\n\t\t\tif (Object.hasOwn(stepMethods, p) === false) {\n\t\t\t\tif (p === executionEffectsKey)\n\t\t\t\t\treturn executionEffects\n\t\t\t\treturn Reflect.get(target, p, receiver)\n\t\t\t}\n\n\t\t\tconst registeredStepMethod = stepMethods[p]!\n""",
              'core proxy metadata lookup',
          )
          write(path, text)

          path = 'packages/internal/src/steps/check/check.ts'
          text = read(path)
          text = replace_once(text, "import { preserveExecutionEffects, withExecutionEffects } from '../../core/execution-effects'\n", '', 'check import')
          text = replace_once(text, 'export const check = /* @__PURE__ */ withExecutionEffects(implStepPlugin<PluginDef>({', 'export const check = implStepPlugin<PluginDef>({', 'check export')
          split = text.split('\n}), {\n\tcheck:', 1)
          if len(split) != 2:
              raise RuntimeError('check resolver suffix not found')
          text = split[0] + '\n})\n'
          write(path, text)

          path = 'packages/internal/src/steps/transform/transform.ts'
          text = read(path)
          text = replace_once(text, "import { CONSERVATIVE_EXECUTION_EFFECTS, withExecutionEffects } from '../../core/execution-effects'\n", '', 'transform import')
          text = replace_once(text, 'export const transform = /* @__PURE__ */ withExecutionEffects(implStepPlugin<PluginDef>({', 'export const transform = implStepPlugin<PluginDef>({', 'transform export')
          split = text.split('\n}), { transform:', 1)
          if len(split) != 2:
              raise RuntimeError('transform resolver suffix not found')
          text = split[0] + '\n})\n'
          write(path, text)

          path = 'packages/internal/src/steps/map/map.ts'
          text = read(path)
          text = replace_once(text, "import { getExecutionEffects, withExecutionEffects } from '../../core/execution-effects'\n", "import { getExecutionEffects } from '../../core/execution-effects'\n", 'map import')
          text = re.sub(r'interface MapExecutionEffectsMetadata \{.*?\}\n\n', '', text, count=1, flags=re.S)
          text = replace_once(text, 'export const map = /* @__PURE__ */ withExecutionEffects(implStepPlugin<PluginDef>({', 'export const map = implStepPlugin<PluginDef>({', 'map export')
          marker = '\t\taddSuccessStep(childrenAreDirectSafe ? executeDirect : executeSnapshot, operationMode)\n'
          if text.count(marker) != 1:
              raise RuntimeError('map final marker not found')
          text = text[:text.index(marker) + len(marker)] + '\t},\n})\n'
          write(path, text)

          path = 'packages/internal/src/steps/set/set.ts'
          text = read(path)
          text = replace_once(text, "import { getExecutionEffects, withExecutionEffects } from '../../core/execution-effects'\n", "import { getExecutionEffects } from '../../core/execution-effects'\n", 'set import')
          text = re.sub(r'interface SetExecutionEffectsMetadata \{.*?\}\n\n', '', text, count=1, flags=re.S)
          text = replace_once(text, 'export const set = /* @__PURE__ */ withExecutionEffects(implStepPlugin<PluginDef>({', 'export const set = implStepPlugin<PluginDef>({', 'set export')
          marker = '\t\taddSuccessStep(itemIsDirectIdentity ? executeDirectIdentity : executeSnapshot, operationMode)\n'
          if text.count(marker) != 1:
              raise RuntimeError('set final marker not found')
          text = text[:text.index(marker) + len(marker)] + '\t},\n})\n'
          write(path, text)

          path = 'packages/internal/src/steps/intersection/intersection.ts'
          text = read(path)
          text = replace_once(text, "import { getExecutionEffects, withExecutionEffects } from '../../core/execution-effects'\n", "import { getExecutionEffects } from '../../core/execution-effects'\n", 'intersection import')
          text = re.sub(r'interface IntersectionExecutionEffectsMetadata \{.*?\}\n\n', '', text, count=1, flags=re.S)
          text = replace_once(text, 'export const intersection = /* @__PURE__ */ withExecutionEffects(implStepPlugin<PluginDef>({', 'export const intersection = implStepPlugin<PluginDef>({', 'intersection export')
          text, count = re.subn(
              r"\n\t\tconst branchesAreDirectSafe = branchEffects\.every\(\n\t\t\teffects => effects\.parentTraversal === 'direct-safe',\n\t\t\)\n",
              '\n',
              text,
              count=1,
          )
          if count != 1:
              raise RuntimeError('intersection branch safety block not found')
          marker = '\t\taddSuccessStep(collectAllIssues ? executeCollectAll : executeFirstIssue, operationMode)\n'
          if text.count(marker) != 1:
              raise RuntimeError('intersection final marker not found')
          text = text[:text.index(marker) + len(marker)] + '\t},\n})\n'
          write(path, text)

          path = 'packages/internal/src/steps/intersection/static-plan.test.ts'
          text = read(path)
          text = replace_once(text, "import { getExecutionEffects } from '../../core/execution-effects'\n", '', 'intersection test import')
          start = text.index("\tit('publishes a fresh ordinary-object output")
          end = text.index("\tit('falls back when branch keys overlap'", start)
          text = text[:start] + text[end:]
          text = text.replace("\n\t\texpect(getExecutionEffects(schema).structuralOutput).toBeNull()", '', 1)
          write(path, text)

          path = 'packages/internal/src/steps/set/traversal-plan.test.ts'
          text = read(path)
          text = replace_once(text, "import { getExecutionEffects } from '../../core/execution-effects'\n", '', 'set test import')
          start = text.index("\tit('uses direct traversal only for synchronous identity-safe item schemas'")
          end = text.index("\tit('does not call the snapshot values method", start)
          text = text[:start] + text[end:]
          write(path, text)
          PY
          git rm .github/workflows/agent-phase-e-trim-effects.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "perf: trim unused structural output effects"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
