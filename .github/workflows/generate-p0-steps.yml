name: Generate P0 Steps

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  Generate:
    if: github.head_ref == 'agent/add-p0-validation-transform-steps'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/add-p0-validation-transform-steps
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize Generator
        shell: bash
        run: |
          cat > /tmp/generator.b64 <<'EOF'

EOF
          base64 -d /tmp/generator.b64 | gzip -d > scripts/generate-p0-steps.py

      - name: Generate Steps
        run: python scripts/generate-p0-steps.py

      - name: Format
        run: pnpm lint:fix

      - name: Refresh API Surface
        run: |
          pnpm build
          pnpm api:surface:update

      - name: Commit Generated Implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit --no-verify -m "feat: add P0 validation and transformation steps"
          git push origin HEAD:agent/add-p0-validation-transform-steps
