name: Dev Finalize Variant V2

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build && pnpm api:surface:update
      - name: Update variant contracts and tree-shaking
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old!r}')
              file.write_text(text.replace(old, new))

          def insert_before(path: str, marker: str, block: str, sentinel: str) -> None:
              file = Path(path)
              text = file.read_text()
              if sentinel in text:
                  return
              if text.count(marker) != 1:
                  raise SystemExit(f'{path}: expected one marker, found {text.count(marker)}: {marker!r}')
              file.write_text(text.replace(marker, f'{block}{marker}'))

          insert_before(
              'docs/api/structures.md',
              '## `intersection(schemas)`\n',
              '''## `variant(options)`\n\nReads one own discriminator property, performs direct property-key lookup, and executes only the selected branch.\n\n```ts\nconst event = v.variant({\n\tdiscriminator: 'type',\n\tvariants: {\n\t\tclick: v.object({\n\t\t\ttype: v.literal('click'),\n\t\t\tx: v.number(),\n\t\t\ty: v.number(),\n\t\t}),\n\t\tkeypress: v.object({\n\t\t\ttype: v.literal('keypress'),\n\t\t\tkey: v.string(),\n\t\t}),\n\t},\n})\n```\n\n**Issues:**\n\n- `variant:expected_object`\n- `variant:invalid_discriminator`\n- issues from the selected branch\n\nInputs must be non-null, non-array objects. The discriminator must be an own property whose value is a configured string, number, or symbol property key. Number and string values follow JavaScript property-key canonicalization, so `1` and `'1'` select the same object-key branch.\n\nVariant maps are non-empty schema-time snapshots. Child issue paths remain unchanged and receive `{ type: 'variant', discriminator, discriminatorValue }` context. A variant-level `message` is an enclosing structure scope; an originating child-step message retains priority.\n\nIf every branch is synchronous, the schema is synchronous. Otherwise selection remains maybe-async because invalid discriminators can still fail synchronously. Unselected branches never execute.\n\n''',
              '## `variant(options)`',
          )

          insert_before(
              'README.md',
              '### Intersection\n',
              '''### Variant\n\n`variant()` performs direct discriminated-union dispatch and executes only the selected branch:\n\n```ts\nconst event = v.variant({\n\tdiscriminator: 'type',\n\tvariants: {\n\t\tclick: v.object({ type: v.literal('click'), x: v.number(), y: v.number() }),\n\t\tkeypress: v.object({ type: v.literal('keypress'), key: v.string() }),\n\t},\n})\n```\n\nThe discriminator must be an own property. Child issue paths are preserved, selected-branch provenance is recorded in issue context, and unselected branches are not executed.\n\n''',
              '### Variant',
          )

          insert_before(
              'packages/valchecker/README.md',
              '## Step naming\n',
              '''## Direct variant dispatch\n\n```ts\nconst event = v.variant({\n\tdiscriminator: 'type',\n\tvariants: {\n\t\tclick: v.object({ type: v.literal('click'), x: v.number(), y: v.number() }),\n\t\tkeypress: v.object({ type: v.literal('keypress'), key: v.string() }),\n\t},\n})\n```\n\n`variant()` reads an own discriminator, uses JavaScript property-key semantics, and executes only the selected branch. Use `union()` when branch selection itself requires ordered validation.\n\n''',
              '## Direct variant dispatch',
          )

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text()
          entry = '- Direct discriminated-union dispatch through `variant({ discriminator, variants, message? })`, with own-property selection, selected-branch issue context, and precise sync/maybe-async inference.\n'
          if entry not in text:
              marker = '### Added\n\n'
              if text.count(marker) != 1:
                  raise SystemExit('CHANGELOG.md: Added heading is not unique')
              changelog.write_text(text.replace(marker, marker + entry))

          insert_before(
              'docs/guide/v1-contract.md',
              '## Intersection semantics\n',
              '''## Variant semantics\n\n`variant({ discriminator, variants, message? })` accepts non-null, non-array objects and requires the discriminator to be an own property. Its value must be a configured string, number, or symbol property key. Number and string discriminator values use JavaScript property-key canonicalization.\n\nConfiguration is snapshotted at schema construction and must contain at least one Valchecker schema. Runtime selection performs direct lookup and executes only one branch. Selected child issue paths remain unchanged and receive `{ type: 'variant', discriminator, discriminatorValue }` context. The variant message is an enclosing structure scope and does not override an originating child-step message.\n\n`variant:expected_object` reports invalid containers. `variant:invalid_discriminator` reports `{ value, discriminator, received, expected }` at path `[discriminator]`. Selected branch validation, operation, and internal issues pass through without trying another branch.\n\nA variant is synchronous only when every configured branch is synchronous. Otherwise it is maybe-async because container and discriminator failures can complete synchronously before branch execution.\n\n''',
              '## Variant semantics',
          )

          patterns = Path('.github/skills/valchecker-expert/references/patterns.md')
          text = patterns.read_text()
          old = 'For object variants, combine `object()` branches with literal discriminator fields.'
          new = 'For ordered fallback across object shapes, combine `union()` branches with literal discriminator fields. When an own discriminator can select one branch directly, use `variant({ discriminator, variants })` so unselected branches are not executed.'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('patterns.md: object variant sentence is not unique')
              patterns.write_text(text.replace(old, new))

          tree = Path('benchmarks/src/treeshake.mjs')
          text = tree.read_text()
          if "valchecker-variant-selective" not in text:
              marker = "\tscenario('valchecker-collection-free'"
              block = '''\tscenario('valchecker-variant-free', 'Valchecker', 'Selective object schema without variant', 'Variant isolation', `\nimport { createValchecker, object, string } from 'valchecker'\nconst v = createValchecker({ steps: [object, string] })\nexport const schema = v.object({ type: v.string() })\nexport const result = schema.execute({ type: 'value' })\n`, {\n\t\tforbiddenMarkers: ['variant:expected_object', 'variant:invalid_discriminator'],\n\t}),\n\tscenario('valchecker-variant-selective', 'Valchecker', 'Selective direct variant schema', 'Variant isolation', `\nimport { createValchecker, literal, number, object, variant } from 'valchecker'\nconst v = createValchecker({ steps: [literal, number, object, variant] })\nexport const schema = v.variant({ discriminator: 'type', variants: {\n\tcircle: v.object({ type: v.literal('circle'), radius: v.number() }),\n\tsquare: v.object({ type: v.literal('square'), size: v.number() }),\n} })\nexport const result = schema.execute({ type: 'square', size: 2 })\n`, {\n\t\trequiredMarkers: ['variant:expected_object', 'variant:invalid_discriminator'],\n\t}),\n'''
              if text.count(marker) != 1:
                  raise SystemExit('treeshake: collection-free scenario marker is not unique')
              text = text.replace(marker, block + marker)

              old = "\tconst unionShorthand = byId(results, 'valchecker-union-shorthand')\n"
              new = old + "\tconst variantFree = byId(results, 'valchecker-variant-free')\n\tconst variantSelective = byId(results, 'valchecker-variant-selective')\n"
              if text.count(old) != 1:
                  raise SystemExit('treeshake: unionShorthand declaration is not unique')
              text = text.replace(old, new)

              old = "\tconst unionProviderMarkersPresent = unionShorthand.retainedRequiredMarkers.length === unionShorthand.requiredMarkers.length\n"
              new = old + "\tconst variantMarkersAbsent = variantFree.retainedForbiddenMarkers.length === 0\n\tconst variantMarkersPresent = variantSelective.retainedRequiredMarkers.length === variantSelective.requiredMarkers.length\n"
              if text.count(old) != 1:
                  raise SystemExit('treeshake: union marker declaration is not unique')
              text = text.replace(old, new)

              old = "\t\t{ name: 'Union shorthand retains every registered provider marker', passed: unionProviderMarkersPresent, value: unionProviderMarkersPresent ? unionShorthand.retainedRequiredMarkers.join(', ') : `${unionShorthand.retainedRequiredMarkers.length}/${unionShorthand.requiredMarkers.length} retained` },\n"
              new = old + "\t\t{ name: 'Selective builds without variant exclude variant issue markers', passed: variantMarkersAbsent, value: variantMarkersAbsent ? 'none retained' : variantFree.retainedForbiddenMarkers.join(', ') },\n\t\t{ name: 'Selective variant retains every owned issue marker', passed: variantMarkersPresent, value: variantMarkersPresent ? variantSelective.retainedRequiredMarkers.join(', ') : `${variantSelective.retainedRequiredMarkers.length}/${variantSelective.requiredMarkers.length} retained` },\n"
              if text.count(old) != 1:
                  raise SystemExit('treeshake: union check is not unique')
              text = text.replace(old, new)

              old = "['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation'"
              new = "['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Variant isolation', 'Map and Set isolation'"
              if text.count(old) != 1:
                  raise SystemExit('treeshake: report group list is not unique')
              text = text.replace(old, new)
              tree.write_text(text)
          PY
      - name: Commit generated contracts
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add api-surface.json README.md packages/valchecker/README.md CHANGELOG.md docs/api/structures.md docs/guide/v1-contract.md benchmarks/src/treeshake.mjs .github/skills/valchecker-expert/references/patterns.md
          if git diff --cached --quiet; then
            echo 'Variant contracts already finalized.'
            exit 0
          fi
          git commit --no-verify -m 'docs: finalize variant contracts'
          git push origin HEAD:${{ github.head_ref }}
