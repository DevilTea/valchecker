name: Dev Finalize Variant

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build && pnpm api:surface:update
      - name: Update variant contracts and tree-shaking
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new))

          structures = Path('docs/api/structures.md')
          if '## `variant(options)`' not in structures.read_text():
              replace_once(
                  'docs/api/structures.md',
                  """### Discriminated unions

          ```ts
          const event = v.union([
          \tv.object({
          \t\ttype: v.literal('click'),
          \t\tx: v.number(),
          \t\ty: v.number(),
          \t}),
          \tv.object({
          \t\ttype: v.literal('keypress'),
          \t\tkey: v.string(),
          \t}),
          ])
          ```

          Literal fields and ordered object branches provide discriminated-union behavior without a separate primitive.

          ## `intersection(schemas)`
          """.replace('          ', ''),
                  """### Discriminated unions

          Ordered `union()` branches remain appropriate when selection itself requires validation. Use `variant()` when an own discriminator can select exactly one configured branch before branch validation.

          ## `variant(options)`

          Reads one own discriminator property, performs direct property-key lookup, and executes only the selected branch.

          ```ts
          const event = v.variant({
          \tdiscriminator: 'type',
          \tvariants: {
          \t\tclick: v.object({
          \t\t\ttype: v.literal('click'),
          \t\t\tx: v.number(),
          \t\t\ty: v.number(),
          \t\t}),
          \t\tkeypress: v.object({
          \t\t\ttype: v.literal('keypress'),
          \t\t\tkey: v.string(),
          \t\t}),
          \t},
          })
          ```

          **Issues:**

          - `variant:expected_object`
          - `variant:invalid_discriminator`
          - issues from the selected branch

          Inputs must be non-null, non-array objects. The discriminator must be an own property whose value is a configured string, number, or symbol property key. Number and string values follow JavaScript property-key canonicalization, so `1` and `'1'` select the same object-key branch.

          Variant maps are non-empty schema-time snapshots. Child issue paths remain unchanged and receive `{ type: 'variant', discriminator, discriminatorValue }` context. A variant-level `message` is an enclosing structure scope; an originating child-step message retains priority.

          If every branch is synchronous, the schema is synchronous. Otherwise selection remains maybe-async because invalid discriminators can still fail synchronously. Unselected branches never execute.

          ## `intersection(schemas)`
          """.replace('          ', ''),
              )

              replace_once(
                  'README.md',
                  """await schema.execute('abc')
          // { value: 3 }
          ```

          ### Intersection
          """.replace('          ', ''),
                  """await schema.execute('abc')
          // { value: 3 }
          ```

          ### Variant

          `variant()` performs direct discriminated-union dispatch and executes only the selected branch:

          ```ts
          const event = v.variant({
          \tdiscriminator: 'type',
          \tvariants: {
          \t\tclick: v.object({ type: v.literal('click'), x: v.number(), y: v.number() }),
          \t\tkeypress: v.object({ type: v.literal('keypress'), key: v.string() }),
          \t},
          })
          ```

          The discriminator must be an own property. Child issue paths are preserved, selected-branch provenance is recorded in issue context, and unselected branches are not executed.

          ### Intersection
          """.replace('          ', ''),
              )

              replace_once(
                  'packages/valchecker/README.md',
                  """Set schemas expose `toMapped()` and `toFiltered()`. Map schemas expose explicit `toMappedKeys()` and `toMappedValues()` transforms. These callbacks traverse a step-start snapshot synchronously; mapped Set items and Map keys must remain unique under SameValueZero.

          ## Step naming
          """.replace('          ', ''),
                  """Set schemas expose `toMapped()` and `toFiltered()`. Map schemas expose explicit `toMappedKeys()` and `toMappedValues()` transforms. These callbacks traverse a step-start snapshot synchronously; mapped Set items and Map keys must remain unique under SameValueZero.

          ## Direct variant dispatch

          ```ts
          const event = v.variant({
          \tdiscriminator: 'type',
          \tvariants: {
          \t\tclick: v.object({ type: v.literal('click'), x: v.number(), y: v.number() }),
          \t\tkeypress: v.object({ type: v.literal('keypress'), key: v.string() }),
          \t},
          })
          ```

          `variant()` reads an own discriminator, uses JavaScript property-key semantics, and executes only the selected branch. Use `union()` when branch selection itself requires ordered validation.

          ## Step naming
          """.replace('          ', ''),
              )

              replace_once(
                  'CHANGELOG.md',
                  """### Added

          - Collection callback transforms:
          """.replace('          ', ''),
                  """### Added

          - Direct discriminated-union dispatch through `variant({ discriminator, variants, message? })`, with own-property selection, selected-branch issue context, and precise sync/maybe-async inference.
          - Collection callback transforms:
          """.replace('          ', ''),
              )

              replace_once(
                  'docs/guide/v1-contract.md',
                  """If every branch fails, union returns collected branch issues. Each issue receives `{ type: 'union', branchIndex }` in `context`; the data `path` is unchanged. Validation and operation failures continue to the next branch, while an internal failure stops evaluation immediately, discards issues from earlier alternative branches, and cannot be hidden by a later successful branch. Branch order is normative.

          ## Intersection semantics
          """.replace('          ', ''),
                  """If every branch fails, union returns collected branch issues. Each issue receives `{ type: 'union', branchIndex }` in `context`; the data `path` is unchanged. Validation and operation failures continue to the next branch, while an internal failure stops evaluation immediately, discards issues from earlier alternative branches, and cannot be hidden by a later successful branch. Branch order is normative.

          ## Variant semantics

          `variant({ discriminator, variants, message? })` accepts non-null, non-array objects and requires the discriminator to be an own property. Its value must be a configured string, number, or symbol property key. Number and string discriminator values use JavaScript property-key canonicalization.

          Configuration is snapshotted at schema construction and must contain at least one Valchecker schema. Runtime selection performs direct lookup and executes only one branch. Selected child issue paths remain unchanged and receive `{ type: 'variant', discriminator, discriminatorValue }` context. The variant message is an enclosing structure scope and does not override an originating child-step message.

          `variant:expected_object` reports invalid containers. `variant:invalid_discriminator` reports `{ value, discriminator, received, expected }` at path `[discriminator]`. Selected branch validation, operation, and internal issues pass through without trying another branch.

          A variant is synchronous only when every configured branch is synchronous. Otherwise it is maybe-async because container and discriminator failures can complete synchronously before branch execution.

          ## Intersection semantics
          """.replace('          ', ''),
              )

              replace_once(
                  '.github/skills/valchecker-expert/references/patterns.md',
                  """For object variants, combine `object()` branches with literal discriminator fields.
          """.replace('          ', ''),
                  """For ordered fallback across object shapes, combine `union()` branches with literal discriminator fields. When an own discriminator can select one branch directly, use `variant({ discriminator, variants })` so unselected branches are not executed.
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\tscenario('valchecker-union-shorthand', 'Valchecker', 'Union with shorthand providers', 'Union shorthand isolation', `
          import { createValchecker, literal, null_, number, undefined_, union } from 'valchecker'
          const v = createValchecker({ steps: [literal, null_, number, undefined_, union] })
          export const schema = v.union(['auto', null, undefined, v.number()])
          export const result = schema.execute('auto')
          `, {
          \t\trequiredMarkers: ['literal:expected_literal', 'null:expected_null', 'undefined:expected_undefined'],
          \t}),
          """.replace('          ', ''),
                  """\tscenario('valchecker-union-shorthand', 'Valchecker', 'Union with shorthand providers', 'Union shorthand isolation', `
          import { createValchecker, literal, null_, number, undefined_, union } from 'valchecker'
          const v = createValchecker({ steps: [literal, null_, number, undefined_, union] })
          export const schema = v.union(['auto', null, undefined, v.number()])
          export const result = schema.execute('auto')
          `, {
          \t\trequiredMarkers: ['literal:expected_literal', 'null:expected_null', 'undefined:expected_undefined'],
          \t}),
          \tscenario('valchecker-variant-free', 'Valchecker', 'Selective object schema without variant', 'Variant isolation', `
          import { createValchecker, object, string } from 'valchecker'
          const v = createValchecker({ steps: [object, string] })
          export const schema = v.object({ type: v.string() })
          export const result = schema.execute({ type: 'value' })
          `, {
          \t\tforbiddenMarkers: ['variant:expected_object', 'variant:invalid_discriminator'],
          \t}),
          \tscenario('valchecker-variant-selective', 'Valchecker', 'Selective direct variant schema', 'Variant isolation', `
          import { createValchecker, literal, number, object, variant } from 'valchecker'
          const v = createValchecker({ steps: [literal, number, object, variant] })
          export const schema = v.variant({ discriminator: 'type', variants: {
          \tcircle: v.object({ type: v.literal('circle'), radius: v.number() }),
          \tsquare: v.object({ type: v.literal('square'), size: v.number() }),
          } })
          export const result = schema.execute({ type: 'square', size: 2 })
          `, {
          \t\trequiredMarkers: ['variant:expected_object', 'variant:invalid_discriminator'],
          \t}),
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\tconst unionSchemaOnly = byId(results, 'valchecker-union-schema-only')
          \tconst unionShorthand = byId(results, 'valchecker-union-shorthand')
          \tconst collectionFree = byId(results, 'valchecker-collection-free')
          """.replace('          ', ''),
                  """\tconst unionSchemaOnly = byId(results, 'valchecker-union-schema-only')
          \tconst unionShorthand = byId(results, 'valchecker-union-shorthand')
          \tconst variantFree = byId(results, 'valchecker-variant-free')
          \tconst variantSelective = byId(results, 'valchecker-variant-selective')
          \tconst collectionFree = byId(results, 'valchecker-collection-free')
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\tconst unionProviderMarkersAbsent = unionSchemaOnly.retainedForbiddenMarkers.length === 0
          \tconst unionProviderMarkersPresent = unionShorthand.retainedRequiredMarkers.length === unionShorthand.requiredMarkers.length
          \tconst collectionMarkersAbsent = collectionFree.retainedForbiddenMarkers.length === 0
          """.replace('          ', ''),
                  """\tconst unionProviderMarkersAbsent = unionSchemaOnly.retainedForbiddenMarkers.length === 0
          \tconst unionProviderMarkersPresent = unionShorthand.retainedRequiredMarkers.length === unionShorthand.requiredMarkers.length
          \tconst variantMarkersAbsent = variantFree.retainedForbiddenMarkers.length === 0
          \tconst variantMarkersPresent = variantSelective.retainedRequiredMarkers.length === variantSelective.requiredMarkers.length
          \tconst collectionMarkersAbsent = collectionFree.retainedForbiddenMarkers.length === 0
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\t\t{ name: 'Union shorthand retains every registered provider marker', passed: unionProviderMarkersPresent, value: unionProviderMarkersPresent ? unionShorthand.retainedRequiredMarkers.join(', ') : `${unionShorthand.retainedRequiredMarkers.length}/${unionShorthand.requiredMarkers.length} retained` },
          \t\t{ name: 'Selective builds without Map and Set exclude collection issue markers',
          """.replace('          ', ''),
                  """\t\t{ name: 'Union shorthand retains every registered provider marker', passed: unionProviderMarkersPresent, value: unionProviderMarkersPresent ? unionShorthand.retainedRequiredMarkers.join(', ') : `${unionShorthand.retainedRequiredMarkers.length}/${unionShorthand.requiredMarkers.length} retained` },
          \t\t{ name: 'Selective builds without variant exclude variant issue markers', passed: variantMarkersAbsent, value: variantMarkersAbsent ? 'none retained' : variantFree.retainedForbiddenMarkers.join(', ') },
          \t\t{ name: 'Selective variant retains every owned issue marker', passed: variantMarkersPresent, value: variantMarkersPresent ? variantSelective.retainedRequiredMarkers.join(', ') : `${variantSelective.retainedRequiredMarkers.length}/${variantSelective.requiredMarkers.length} retained` },
          \t\t{ name: 'Selective builds without Map and Set exclude collection issue markers',
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation', 'Collection capability isolation', 'Collection representation isolation', 'Collection callback isolation', 'Full-library reference']
          """.replace('          ', ''),
                  """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Variant isolation', 'Map and Set isolation', 'Collection capability isolation', 'Collection representation isolation', 'Collection callback isolation', 'Full-library reference']
          """.replace('          ', ''),
              )
          PY
      - name: Commit generated contracts
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add api-surface.json README.md packages/valchecker/README.md CHANGELOG.md docs/api/structures.md docs/guide/v1-contract.md benchmarks/src/treeshake.mjs .github/skills/valchecker-expert/references/patterns.md
          if git diff --cached --quiet; then
            echo 'Variant contracts already finalized.'
            exit 0
          fi
          git commit --no-verify -m 'docs: finalize variant contracts'
          git push origin HEAD:${{ github.head_ref }}
