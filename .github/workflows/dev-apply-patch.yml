name: Dev Apply Patch

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Decode implementation patch
        shell: bash
        run: |
          cat .github/dev-patch/* | tr -d '\r\n' > /tmp/union-shorthand.patch.b64
          base64 --decode --ignore-garbage /tmp/union-shorthand.patch.b64 > /tmp/union-shorthand.patch
          wc -c /tmp/union-shorthand.patch
          sha256sum /tmp/union-shorthand.patch
      - name: Apply implementation patch
        shell: bash
        run: |
          git apply --check /tmp/union-shorthand.patch
          git apply /tmp/union-shorthand.patch
      - name: Remove development transport files
        shell: bash
        run: |
          rm -rf .github/dev-patch
          rm -f .github/workflows/dev-apply-patch.yml
          rm -f .github/workflows/dev-source-snapshot.yml
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat: add registration-aware union shorthand'
      - name: Push implementation
        shell: bash
        run: git push origin HEAD:${{ github.head_ref }}
