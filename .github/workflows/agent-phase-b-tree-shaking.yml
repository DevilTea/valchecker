name: Agent Phase B Tree Shaking

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/execution-effect-metadata'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Preserve tree shaking and tighten object traversal safety
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          annotated = (
              'bigint',
              'boolean',
              'check',
              'intersection',
              'number',
              'object',
              'string',
              'transform',
          )
          for name in annotated:
              path = Path(f'packages/internal/src/steps/{name}/{name}.ts')
              text = path.read_text()
              old = f'export const {name} = withExecutionEffects('
              new = f'export const {name} = /* @__PURE__ */ withExecutionEffects('
              if text.count(old) != 1:
                  raise RuntimeError(f'{path}: expected one metadata registration call')
              path.write_text(text.replace(old, new))

          path = Path('packages/internal/src/steps/object/object.ts')
          text = path.read_text()

          def replace(old: str, new: str, count: int = 1) -> None:
              global text
              actual = text.count(old)
              if actual != count:
                  raise RuntimeError(f'object.ts: expected {count} matches, found {actual}: {old[:80]!r}')
              text = text.replace(old, new)

          replace(
              "import { getExecutionEffects, withExecutionEffects } from '../../core/execution-effects'",
              "import { withExecutionEffects } from '../../core/execution-effects'",
          )
          replace(
              """interface ObjectExecutionEffectsMetadata {\n\treadonly keys: readonly PropertyKey[]\n\treadonly childrenAreDirectSafe: boolean\n}\n""",
              """interface ObjectExecutionEffectsMetadata {\n\treadonly keys: readonly PropertyKey[]\n}\n""",
          )
          replace("\t\tlet childrenAreDirectSafe = true\n", "")
          replace(
              """\t\t\tif (getExecutionEffects(schema).parentTraversal !== 'direct-safe')\n\t\t\t\tchildrenAreDirectSafe = false\n""",
              "",
          )
          replace(
              "\t\treturn { keys, childrenAreDirectSafe }\n",
              "\t\treturn { keys }\n",
          )
          replace(
              """\tobject: (previous, _params, stepMetadata) => {\n\t\tconst { keys, childrenAreDirectSafe } = stepMetadata as ObjectExecutionEffectsMetadata\n\t\treturn {\n\t\t\tidentity: 'may-transform',\n\t\t\tparentTraversal: previous.parentTraversal === 'direct-safe' && childrenAreDirectSafe\n\t\t\t\t? 'direct-safe'\n\t\t\t\t: 'snapshot-required',\n\t\t\tstructuralOutput: { kind: 'fresh-ordinary-object', keys },\n\t\t}\n\t},\n""",
              """\tobject: (_previous, _params, stepMetadata) => {\n\t\tconst { keys } = stepMetadata as ObjectExecutionEffectsMetadata\n\t\treturn {\n\t\t\tidentity: 'may-transform',\n\t\t\tparentTraversal: 'snapshot-required',\n\t\t\tstructuralOutput: { kind: 'fresh-ordinary-object', keys },\n\t\t}\n\t},\n""",
          )

          path.write_text(text)
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/agent-phase-b-tree-shaking.yml
          git add packages/internal/src/steps
          git commit -m "fix: preserve metadata tree shaking and traversal safety"
          git push