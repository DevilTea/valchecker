name: Apply registered effect resolver refactor

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 1
          show-progress: false
      - name: Apply guarded core edits
        run: python .agent/refactor-effect-core.py
      - name: Apply guarded built-in edits
        id: builtins
        shell: bash
        run: |
          set +e
          python .agent/refactor-effect-builtins.py > resolver-refactor.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: steps.builtins.outputs.status != '0'
        with:
          name: resolver-refactor-diagnostics
          path: resolver-refactor.log
      - name: Fail on guarded edit error
        if: steps.builtins.outputs.status != '0'
        run: exit 1
      - name: Remove temporary automation
        run: rm -rf .agent .github/workflows/agent-refactor-effect-resolvers.yml resolver-refactor.log
      - name: Commit resolver refactor
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "perf: resolve effects from registered plugins"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
