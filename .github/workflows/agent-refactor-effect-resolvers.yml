name: Apply registered effect resolver refactor

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - name: Apply guarded core edits
        run: python .agent/refactor-effect-core.py
      - name: Apply guarded built-in edits
        shell: bash
        run: |
          set +e
          output=$(python .agent/refactor-effect-builtins.py 2>&1)
          status=$?
          printf '%s\n' "$output" | tail -40
          exit $status
      - name: Remove temporary automation
        run: rm -rf .agent .github/workflows/agent-refactor-effect-resolvers.yml
      - name: Commit resolver refactor
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "perf: resolve effects from registered plugins"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
