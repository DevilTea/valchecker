name: Agent apply PR B contract docs fix

on:
  push:
    branches:
      - agent/structural-combinator-failure-semantics
    paths:
      - .github/workflows/agent-apply-prb-fix5.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structural-combinator-failure-semantics
          fetch-depth: 0

      - name: Apply contract documentation clarification
        shell: bash
        run: |
          printf '%s  %s\n' \
            'cd6e2fafa5e926b852a22e9e12939fdeff4c2c799b2ecf30ec7cef9e5c578f80' \
            '.github/agent/prb-fix5.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode .github/agent/prb-fix5.patch.gz.b64 > /tmp/prb-fix5.patch.gz
          gunzip -c /tmp/prb-fix5.patch.gz > /tmp/prb-fix5.patch
          printf '%s  %s\n' \
            'd65ef23f234071647476d6045d49cc400fb4b92f2cd7e5beedcb72000ca85fdb' \
            '/tmp/prb-fix5.patch' \
            | sha256sum --check --strict
          git apply --index /tmp/prb-fix5.patch
          rm -f \
            .github/agent/prb-fix5.patch.gz.b64 \
            .github/workflows/agent-apply-prb-fix5.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: clarify fatal union and internal helper contracts'
          git push origin HEAD:agent/structural-combinator-failure-semantics
