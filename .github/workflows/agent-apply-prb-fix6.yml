name: Agent apply PR B provenance coverage test

on:
  push:
    branches:
      - agent/structural-combinator-failure-semantics
    paths:
      - .github/workflows/agent-apply-prb-fix6.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structural-combinator-failure-semantics
          fetch-depth: 0

      - name: Apply provenance coverage test
        shell: bash
        run: |
          printf '%s  %s\n' \
            'f5b6435226347b8d27916243a096ce78f3b4f8584bb602641f4e15d9691cebb8' \
            '.github/agent/prb-fix6.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode .github/agent/prb-fix6.patch.gz.b64 > /tmp/prb-fix6.patch.gz
          gunzip -c /tmp/prb-fix6.patch.gz > /tmp/prb-fix6.patch
          printf '%s  %s\n' \
            'a930b7903f5b1c8be6ea60f00bd9e322e20a068a37ab650afe09361da60c6e19' \
            '/tmp/prb-fix6.patch' \
            | sha256sum --check --strict
          git apply --index /tmp/prb-fix6.patch
          rm -f \
            .github/agent/prb-fix6.patch.gz.b64 \
            .github/workflows/agent-apply-prb-fix6.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test: cover fallback provenance snapshots'
          git push origin HEAD:agent/structural-combinator-failure-semantics
