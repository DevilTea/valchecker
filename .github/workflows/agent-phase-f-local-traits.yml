name: Agent Phase F Local Traits

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/execution-effect-metadata'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 1
          show-progress: false
      - name: Match base registration format
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/phase-f-local-traits.py')
          text = path.read_text()
          old = '''text = sub_once(
              text,
              r"(\\t\\t\\tstepMethods\\[method\\] = \\{\\n\\t\\t\\t\\trun: stepMethod,\\n\\t\\t\\t\\tdefaultOperationMode,)(\\n\\t\\t\\t\\})",
              r"\\1\\n\\t\\t\\t\\tidentityRuntimeSteps,\\2",
              'registered method assignment',
          )'''
          new = '''text = sub_once(
              text,
              r"\\t\\t\\tstepMethods\\[method\\] = \\{ run: stepMethod, defaultOperationMode \\}",
              "\\t\\t\\tstepMethods[method] = { run: stepMethod, defaultOperationMode, identityRuntimeSteps }",
              'registered method assignment',
          )'''
          if text.count(old) != 1:
              raise RuntimeError(f'expected one script block, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Replace global effects with local runtime traits
        id: migration
        continue-on-error: true
        run: python .github/scripts/phase-f-local-traits.py > phase-f-local-traits.log 2>&1
      - name: Upload migration diagnostics
        if: steps.migration.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: phase-f-local-traits-log
          path: phase-f-local-traits.log
      - name: Fail after diagnostics
        if: steps.migration.outcome == 'failure'
        run: exit 1
      - name: Commit migration
        if: steps.migration.outcome == 'success'
        run: |
          git rm .github/workflows/agent-phase-f-local-traits.yml .github/scripts/phase-f-local-traits.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "perf: localize collection execution traits"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
