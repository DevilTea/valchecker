name: Apply Step Options Migration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  Migrate:
    if: github.head_ref == 'agent/standardize-step-options'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Baseline Artifacts
        run: pnpm build

      - name: Patch Temporary Migration Script
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-step-options-migration.ts')
          source = path.read_text()
          source = source.replace(
              "if (replacement.end > previousStart)\n\t\t\tthrow new Error(`Overlapping replacement at ${replacement.start}:${replacement.end}`)",
              "if (replacement.end > previousStart)\n\t\t\tcontinue",
          )
          source = source.replace(
              "function objectLiteral(properties: string[]): string {\n\treturn `{ ${properties.join(', ')} }`\n}\n",
              "function objectLiteral(properties: string[]): string {\n\treturn `{ ${properties.join(', ')} }`\n}\n\nfunction hasOptionProperty(node: ts.Expression, property: string): boolean {\n\treturn ts.isObjectLiteralExpression(node) && node.properties.some((member) => {\n\t\tif (!ts.isPropertyAssignment(member) && !ts.isShorthandPropertyAssignment(member))\n\t\t\treturn false\n\t\treturn member.name.getText().replace(/[\\\"']/g, '') === property\n\t})\n}\n",
          )
          source = source.replace(
              "messageOnlyMethods.has(method) && args.length === 1",
              "messageOnlyMethods.has(method) && args.length === 1 && !hasOptionProperty(args[0]!, 'message')",
          )
          source = source.replace(
              "operandMessageMethods.has(method) && args.length === 2",
              "operandMessageMethods.has(method) && args.length === 2 && !hasOptionProperty(args[1]!, 'message')",
          )
          source = source.replace(
              "if (args.length === 2)\n\t\t\t\t\treplaceArguments(`${argText(0)}, ${objectLiteral([`thisArg: ${argText(1)}`])}`)",
              "if (args.length === 2 && !hasOptionProperty(args[1]!, 'thisArg') && !hasOptionProperty(args[1]!, 'message'))\n\t\t\t\t\treplaceArguments(`${argText(0)}, ${objectLiteral([`thisArg: ${argText(1)}`])}`)",
          )
          source = source.replace(
              "if (args.length === 1)\n\t\t\t\t\treplaceArguments(objectLiteral([`compareFn: ${argText(0)}`]))",
              "if (args.length === 1 && !hasOptionProperty(args[0]!, 'compareFn') && !hasOptionProperty(args[0]!, 'message'))\n\t\t\t\t\treplaceArguments(objectLiteral([`compareFn: ${argText(0)}`]))",
          )
          source = source.replace(
              "\tvisit(sf)\n\treturn applyReplacements(source, replacements)\n}",
              "\tvisit(sf)\n\tconst transformed = applyReplacements(source, replacements)\n\treturn transformed === source ? source : transformCalls(filePath, transformed)\n}",
          )
          source = source.replace(
              "'- concrete transformations use `toXxx`, except generic `transform()`;\\n'",
              "'`check()` and `transform()` are generic escape hatches and intentionally do not use artificial `isValid` or `toTransformed` names.\\n'",
          )
          start = source.index("for (const marker of ['message?: MessageHandler<'")
          end = source.index("fs.rmSync(path.join(root, 'scripts/apply-step-options-migration.ts'))", start)
          path.write_text(source[:start] + source[end:])
          PY

      - name: Apply Migration
        shell: bash
        run: |
          set -o pipefail
          pnpm tsx scripts/apply-step-options-migration.ts 2>&1 | tee migration.log

      - name: Upload Migration Log
        if: failure() && hashFiles('migration.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: step-options-migration-log
          path: migration.log
          if-no-files-found: error
          retention-days: 7

      - name: Format
        run: pnpm lint:fix

      - name: Rebuild and Record API Surface
        run: |
          pnpm build
          pnpm api:surface:update

      - name: Validate
        run: |
          pnpm test:quality
          pnpm typecheck
          pnpm test
          pnpm docs:build

      - name: Commit Migration
        run: |
          rm -f placeholder.tmp
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor!: standardize built-in step options"
          git push origin HEAD:agent/standardize-step-options
