name: Apply Step Options Migration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  Migrate:
    if: github.head_ref == 'agent/standardize-step-options'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Baseline Artifacts
        run: pnpm build

      - name: Apply Migration
        run: pnpm tsx scripts/apply-step-options-migration.ts

      - name: Format
        run: pnpm lint:fix

      - name: Rebuild and Record API Surface
        run: |
          pnpm build
          pnpm api:surface:update

      - name: Validate
        run: |
          pnpm test:quality
          pnpm typecheck
          pnpm test
          pnpm docs:build

      - name: Commit Migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor!: standardize built-in step options"
          git push origin HEAD:agent/standardize-step-options
