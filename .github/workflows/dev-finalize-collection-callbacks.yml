name: Dev Finalize Collection Callbacks

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build && pnpm api:surface:update
      - name: Update public contracts and tree-shaking scenarios
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new))

          transforms = Path('docs/api/transforms.md')
          if '### Collection callback transforms' not in transforms.read_text():
              replace_once(
                  'docs/api/transforms.md',
                  """These representation transforms are synchronous, emit no new issue, and do not mutate the source collection. `toObject()` is intentionally not implied because object conversion requires a separate key/prototype/collision policy.

          ## JSON transforms
          """.replace('          ', ''),
                  """These representation transforms are synchronous, emit no new issue, and do not mutate the source collection. `toObject()` is intentionally not implied because object conversion requires a separate key/prototype/collision policy.

          ### Collection callback transforms

          Collection callbacks receive the current transformed pipeline collection, not the caller's original Map or Set. Map entries and Set items are snapshotted when the callback step begins, so callback mutations do not extend the current traversal. The callback receives a stable collection reference for every reached item.

          Callback return values are consumed synchronously. Returned promises remain Set items, Map keys, or Map values and do not make these steps asynchronous.

          #### Set `toMapped(mapper, options?)`

          Maps Set items through `(item, index, value)` and returns `Set<Mapped>`. Callback exceptions emit `toMapped:callback_failed`. Mapped items must remain unique under SameValueZero; collisions emit `toMapped:duplicate_mapped_item` with both source items and indices.

          #### Set `toFiltered(predicate, options?)`

          Filters Set items through `(item, index, value)` and returns a new Set. Type-guard predicates narrow the output item type. Callback exceptions emit `toFiltered:callback_failed`. A returned promise is an ordinary truthy predicate result.

          #### Map `toMappedValues(mapper, options?)`

          Maps values through `(entryValue, key, index, value)` while preserving keys and insertion order. Callback exceptions emit `toMappedValues:callback_failed`.

          #### Map `toMappedKeys(mapper, options?)`

          Maps keys through `(key, entryValue, index, value)` while preserving values and insertion order. Callback exceptions emit `toMappedKeys:callback_failed`. Mapped keys must remain unique under SameValueZero; collisions emit `toMappedKeys:duplicate_mapped_key` with both source keys and indices.

          ```ts
          const tags = v.set(v.string())
          	.toMapped((item, index) => `${index}:${item}`)
          	.toFiltered(item => item.length > 2)

          const scores = v.map({ key: v.string(), value: v.number() })
          	.toMappedKeys(key => key.toLowerCase())
          	.toMappedValues(value => value * 2)
          ```

          Map filtering and Map-to-object conversion remain outside this contract.

          ## JSON transforms
          """.replace('          ', ''),
              )

              replace_once(
                  'README.md',
                  """These transformations return new arrays and do not mutate the source collection. Map-to-object conversion is intentionally not implied because it requires separate key, prototype, and collision policies.

          ## Composition
          """.replace('          ', ''),
                  """These transformations return new arrays and do not mutate the source collection. Map-to-object conversion is intentionally not implied because it requires separate key, prototype, and collision policies.

          Callback transforms preserve the same state-aware collection APIs:

          ```ts
          const mappedTags = tags
          	.toMapped((item, index) => `${index}:${item}`)
          	.toFiltered(item => item.length > 2)

          const normalizedScores = scores
          	.toMappedKeys(key => key.toLowerCase())
          	.toMappedValues(value => value * 2)
          ```

          Collection callbacks are synchronous and receive the current transformed collection. Traversal uses a step-start snapshot. Set item and Map key mapping reject SameValueZero collisions rather than silently losing data.

          ## Composition
          """.replace('          ', ''),
              )

              replace_once(
                  'packages/valchecker/README.md',
                  """Use `toArray()` for Set items and `toKeys()`, `toValues()`, or `toEntries()` for explicit Map representations. Each transform returns a new insertion-ordered array and emits no new issue.

          ## Step naming
          """.replace('          ', ''),
                  """Use `toArray()` for Set items and `toKeys()`, `toValues()`, or `toEntries()` for explicit Map representations. Each transform returns a new insertion-ordered array and emits no new issue.

          Set schemas expose `toMapped()` and `toFiltered()`. Map schemas expose explicit `toMappedKeys()` and `toMappedValues()` transforms. These callbacks traverse a step-start snapshot synchronously; mapped Set items and Map keys must remain unique under SameValueZero.

          ## Step naming
          """.replace('          ', ''),
              )

              replace_once(
                  'CHANGELOG.md',
                  """- Explicit collection representation transforms: Set `toArray()` and Map `toKeys()`, `toValues()`, and `toEntries()`.
          """.replace('          ', ''),
                  """- Collection callback transforms: Set `toMapped()`/`toFiltered()` and Map `toMappedKeys()`/`toMappedValues()` with step-start snapshots, typed operation issues, and explicit SameValueZero collision diagnostics.
          - Explicit collection representation transforms: Set `toArray()` and Map `toKeys()`, `toValues()`, and `toEntries()`.
          """.replace('          ', ''),
              )

              replace_once(
                  'docs/guide/v1-contract.md',
                  """`toArray()` replaces a Set with a new item array. `toKeys()`, `toValues()`, and `toEntries()` replace a Map with new key, value, or mutable entry-tuple arrays. All four preserve insertion order, remain synchronous, add no issue, and do not mutate the source collection. Map-to-object conversion is outside this contract because it requires explicit key canonicalization, prototype, and collision policy.

          ## Union semantics
          """.replace('          ', ''),
                  """`toArray()` replaces a Set with a new item array. `toKeys()`, `toValues()`, and `toEntries()` replace a Map with new key, value, or mutable entry-tuple arrays. All four preserve insertion order, remain synchronous, add no issue, and do not mutate the source collection. Map-to-object conversion is outside this contract because it requires explicit key canonicalization, prototype, and collision policy.

          Set `toMapped()` and `toFiltered()` snapshot the current pipeline Set's items when the step begins. Map `toMappedKeys()` and `toMappedValues()` likewise snapshot entries. Callbacks receive the current transformed collection and a stable reference across the reached snapshot, while callback mutations do not extend traversal. Return values are consumed synchronously; returned promises remain ordinary mapped values or truthy predicate results.

          Callback exceptions produce operation issues with the current item or entry and index. Set item mapping rejects duplicate SameValueZero outputs with `toMapped:duplicate_mapped_item`. Map key mapping rejects duplicate SameValueZero outputs with `toMappedKeys:duplicate_mapped_key`. Both collision payloads preserve first/current source provenance. Map filtering remains intentionally absent.

          ## Union semantics
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\tscenario('valchecker-collection-representations', 'Valchecker', 'Selective collection representations', 'Collection representation isolation', `
          import { createValchecker, map, number, set, string, toArray, toEntries, toKeys, toValues } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string, toArray, toEntries, toKeys, toValues] })
          export const result = {
          \titems: v.set(v.string()).toArray().execute(new Set(['a'])),
          \tkeys: v.map({ key: v.string(), value: v.number() }).toKeys().execute(new Map([['a', 1]])),
          \tvalues: v.map({ key: v.string(), value: v.number() }).toValues().execute(new Map([['a', 1]])),
          \tentries: v.map({ key: v.string(), value: v.number() }).toEntries().execute(new Map([['a', 1]])),
          }
          `, {
          \t\trequiredMarkers: ['toArray', 'toKeys', 'toValues', 'toEntries'],
          \t}),
          \t...[
          """.replace('          ', ''),
                  """\tscenario('valchecker-collection-representations', 'Valchecker', 'Selective collection representations', 'Collection representation isolation', `
          import { createValchecker, map, number, set, string, toArray, toEntries, toKeys, toValues } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string, toArray, toEntries, toKeys, toValues] })
          export const result = {
          \titems: v.set(v.string()).toArray().execute(new Set(['a'])),
          \tkeys: v.map({ key: v.string(), value: v.number() }).toKeys().execute(new Map([['a', 1]])),
          \tvalues: v.map({ key: v.string(), value: v.number() }).toValues().execute(new Map([['a', 1]])),
          \tentries: v.map({ key: v.string(), value: v.number() }).toEntries().execute(new Map([['a', 1]])),
          }
          `, {
          \t\trequiredMarkers: ['toArray', 'toKeys', 'toValues', 'toEntries'],
          \t}),
          \tscenario('valchecker-collection-callbacks-free', 'Valchecker', 'Collections without callback transforms', 'Collection callback isolation', `
          import { createValchecker, map, number, set, string } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string] })
          export const result = {
          \tmap: v.map({ key: v.string(), value: v.number() }).execute(new Map([['a', 1]])),
          \tset: v.set(v.string()).execute(new Set(['a'])),
          }
          `, {
          \t\tforbiddenMarkers: ['toMapped:callback_failed', 'toMapped:duplicate_mapped_item', 'toFiltered:callback_failed', 'toMappedKeys:callback_failed', 'toMappedKeys:duplicate_mapped_key', 'toMappedValues:callback_failed'],
          \t}),
          \tscenario('valchecker-collection-callbacks', 'Valchecker', 'Selective collection callback transforms', 'Collection callback isolation', `
          import { createValchecker, map, number, set, string, toFiltered, toMapped, toMappedKeys, toMappedValues } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string, toFiltered, toMapped, toMappedKeys, toMappedValues] })
          export const result = {
          \tmappedItems: v.set(v.string()).toMapped(value => value.length).execute(new Set(['a'])),
          \tfilteredItems: v.set(v.string()).toFiltered(value => value.length > 1).execute(new Set(['a', 'bb'])),
          \tmappedKeys: v.map({ key: v.string(), value: v.number() }).toMappedKeys(key => key.toUpperCase()).execute(new Map([['a', 1]])),
          \tmappedValues: v.map({ key: v.string(), value: v.number() }).toMappedValues(value => value * 2).execute(new Map([['a', 1]])),
          }
          `, {
          \t\trequiredMarkers: ['toMapped:callback_failed', 'toMapped:duplicate_mapped_item', 'toFiltered:callback_failed', 'toMappedKeys:callback_failed', 'toMappedKeys:duplicate_mapped_key', 'toMappedValues:callback_failed'],
          \t}),
          \t...[
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\tconst collectionRepresentationsFree = byId(results, 'valchecker-collection-representations-free')
          \tconst collectionRepresentations = byId(results, 'valchecker-collection-representations')
          \tconst comparisons = [
          """.replace('          ', ''),
                  """\tconst collectionRepresentationsFree = byId(results, 'valchecker-collection-representations-free')
          \tconst collectionRepresentations = byId(results, 'valchecker-collection-representations')
          \tconst collectionCallbacksFree = byId(results, 'valchecker-collection-callbacks-free')
          \tconst collectionCallbacks = byId(results, 'valchecker-collection-callbacks')
          \tconst comparisons = [
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\tconst collectionRepresentationMarkersAbsent = collectionRepresentationsFree.retainedForbiddenMarkers.length === 0
          \tconst collectionRepresentationMarkersPresent = collectionRepresentations.retainedRequiredMarkers.length === collectionRepresentations.requiredMarkers.length
          \tconst checks = [
          """.replace('          ', ''),
                  """\tconst collectionRepresentationMarkersAbsent = collectionRepresentationsFree.retainedForbiddenMarkers.length === 0
          \tconst collectionRepresentationMarkersPresent = collectionRepresentations.retainedRequiredMarkers.length === collectionRepresentations.requiredMarkers.length
          \tconst collectionCallbackMarkersAbsent = collectionCallbacksFree.retainedForbiddenMarkers.length === 0
          \tconst collectionCallbackMarkersPresent = collectionCallbacks.retainedRequiredMarkers.length === collectionCallbacks.requiredMarkers.length
          \tconst checks = [
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\t\t{ name: 'Selective collection representations retain every method marker', passed: collectionRepresentationMarkersPresent, value: collectionRepresentationMarkersPresent ? collectionRepresentations.retainedRequiredMarkers.join(', ') : `${collectionRepresentations.retainedRequiredMarkers.length}/${collectionRepresentations.requiredMarkers.length} retained` },
          \t]
          """.replace('          ', ''),
                  """\t\t{ name: 'Selective collection representations retain every method marker', passed: collectionRepresentationMarkersPresent, value: collectionRepresentationMarkersPresent ? collectionRepresentations.retainedRequiredMarkers.join(', ') : `${collectionRepresentations.retainedRequiredMarkers.length}/${collectionRepresentations.requiredMarkers.length} retained` },
          \t\t{ name: 'Collections without callback transforms exclude their issue markers', passed: collectionCallbackMarkersAbsent, value: collectionCallbackMarkersAbsent ? 'none retained' : collectionCallbacksFree.retainedForbiddenMarkers.join(', ') },
          \t\t{ name: 'Selective collection callbacks retain every issue marker', passed: collectionCallbackMarkersPresent, value: collectionCallbackMarkersPresent ? collectionCallbacks.retainedRequiredMarkers.join(', ') : `${collectionCallbacks.retainedRequiredMarkers.length}/${collectionCallbacks.requiredMarkers.length} retained` },
          \t]
          """.replace('          ', ''),
              )

              replace_once(
                  'benchmarks/src/treeshake.mjs',
                  """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation', 'Collection capability isolation', 'Collection representation isolation', 'Full-library reference']
          """.replace('          ', ''),
                  """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation', 'Collection capability isolation', 'Collection representation isolation', 'Collection callback isolation', 'Full-library reference']
          """.replace('          ', ''),
              )
          PY
      - name: Commit generated contracts
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add api-surface.json README.md packages/valchecker/README.md CHANGELOG.md docs/api/transforms.md docs/guide/v1-contract.md benchmarks/src/treeshake.mjs
          if git diff --cached --quiet; then
            echo 'Collection callback contracts already finalized.'
            exit 0
          fi
          git commit --no-verify -m 'docs: finalize collection callback contracts'
          git push origin HEAD:${{ github.head_ref }}
