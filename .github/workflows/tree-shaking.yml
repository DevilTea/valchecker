name: Tree Shaking
run-name: Tree-shaking report by @${{ github.actor }}

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/tree-shaking.yml'
      - 'benchmarks/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

concurrency:
  group: tree-shaking-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Valchecker
        run: pnpm build

      - name: Install Report Dependencies
        run: pnpm --dir benchmarks install --ignore-workspace --lockfile=false --ignore-scripts

      - name: Generate Tree-shaking Report
        run: pnpm --dir benchmarks treeshake --output ../artifacts/tree-shaking

      - name: Publish Job Summary
        if: always() && hashFiles('artifacts/tree-shaking/summary.md') != ''
        shell: bash
        run: cat artifacts/tree-shaking/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Tree-shaking Report
        if: always() && hashFiles('artifacts/tree-shaking/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tree-shaking-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/tree-shaking
          if-no-files-found: error
          retention-days: 90
