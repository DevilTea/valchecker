name: Agent apply PR B fallback isolation fix

on:
  push:
    branches:
      - agent/structural-combinator-failure-semantics
    paths:
      - .github/workflows/agent-apply-prb-fix4.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structural-combinator-failure-semantics
          fetch-depth: 0

      - name: Apply fallback mutation isolation fix
        shell: bash
        run: |
          printf '%s  %s\n' \
            '7a57f8d203d8297fd984124930e2a668f624eb697739ca854e6776110b4ae6ea' \
            '.github/agent/prb-fix4.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode .github/agent/prb-fix4.patch.gz.b64 > /tmp/prb-fix4.patch.gz
          gunzip -c /tmp/prb-fix4.patch.gz > /tmp/prb-fix4.patch
          printf '%s  %s\n' \
            '6c323cef6f0966f3e0dc042fc043984d3b5b04fe56b01fb95606077439e6ee58' \
            '/tmp/prb-fix4.patch' \
            | sha256sum --check --strict
          git apply --index /tmp/prb-fix4.patch
          rm -f \
            .github/agent/prb-fix4.patch.gz.b64 \
            .github/workflows/agent-apply-prb-fix4.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: isolate fallback callback issue mutations'
          git push origin HEAD:agent/structural-combinator-failure-semantics
