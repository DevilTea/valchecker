name: Agent apply PR B review fixes

on:
  push:
    branches:
      - agent/structural-combinator-failure-semantics
    paths:
      - .github/workflows/agent-apply-prb-fix1.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structural-combinator-failure-semantics
          fetch-depth: 0

      - name: Apply review and coverage fixes
        shell: bash
        run: |
          printf '%s  %s\n' \
            'be047d4283f5d07ee04e49b9235a707200dda07e5753e4d35a9d233c1a80bd00' \
            '.github/agent/prb-fix1.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode .github/agent/prb-fix1.patch.gz.b64 > /tmp/prb-fix1.patch.gz
          gunzip -c /tmp/prb-fix1.patch.gz > /tmp/prb-fix1.patch
          printf '%s  %s\n' \
            '16f00754da4abc6c78d0065c1d95061ff1d49ab4316b5a279a610c9442af105a' \
            '/tmp/prb-fix1.patch' \
            | sha256sum --check --strict
          git apply --index /tmp/prb-fix1.patch
          rm -f \
            .github/agent/prb-fix1.patch.gz.b64 \
            .github/workflows/agent-apply-prb-fix1.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: align structural output and conflict provenance'
          git push origin HEAD:agent/structural-combinator-failure-semantics
