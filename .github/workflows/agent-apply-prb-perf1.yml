name: Agent apply PR B performance fix

on:
  push:
    branches:
      - agent/structural-combinator-failure-semantics
    paths:
      - .github/workflows/agent-apply-prb-perf1.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structural-combinator-failure-semantics
          fetch-depth: 0

      - name: Apply structural hot-path optimizations
        shell: bash
        run: |
          printf '%s  %s\n' \
            'cece6538c5023a83adb220a9955bcc1afda298e4c3be57f1624e811fb2f5c9d6' \
            '.github/agent/prb-perf1.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode .github/agent/prb-perf1.patch.gz.b64 > /tmp/prb-perf1.patch.gz
          gunzip -c /tmp/prb-perf1.patch.gz > /tmp/prb-perf1.patch
          printf '%s  %s\n' \
            'e025e5cfdd3a941a902a6fccc1d221b59e34fc062e07c3bc8c6b57a00cd9d63f' \
            '/tmp/prb-perf1.patch' \
            | sha256sum --check --strict
          git apply --index /tmp/prb-perf1.patch
          rm -f \
            .github/agent/prb-perf1.patch.gz.b64 \
            .github/workflows/agent-apply-prb-perf1.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'perf: restore structural hot paths'
          git push origin HEAD:agent/structural-combinator-failure-semantics
