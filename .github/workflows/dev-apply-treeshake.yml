name: Dev Apply Tree-shaking Patch

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply tree-shaking isolation checks
        shell: bash
        run: |
          git apply --check .github/dev-treeshake.patch
          git apply .github/dev-treeshake.patch
          rm -f .github/dev-treeshake.patch
          rm -f .github/workflows/dev-apply-treeshake.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'test: verify union shorthand tree-shaking isolation'
          git push origin HEAD:${{ github.head_ref }}
