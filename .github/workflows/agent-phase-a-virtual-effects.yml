name: Agent Phase A Virtual Effects

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/execution-effect-metadata'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Virtualize execution effect metadata
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              actual = text.count(old)
              if actual != count:
                  raise RuntimeError(f'{path}: expected {count} matches, found {actual}')
              file.write_text(text.replace(old, new))

          replace(
              'packages/internal/src/core/execution-effects.ts',
              """interface SchemaWithExecutionEffects {\n\treadonly '~core'?: {\n\t\treadonly [executionEffectsKey]?: ExecutionEffects | undefined\n\t} | undefined\n}\n""",
              """interface SchemaWithExecutionEffects {\n\treadonly [executionEffectsKey]?: ExecutionEffects | undefined\n}\n""",
          )
          replace(
              'packages/internal/src/core/execution-effects.ts',
              "return (schema as SchemaWithExecutionEffects)['~core']?.[executionEffectsKey] ?? conservativeExecutionEffects",
              "return (schema as SchemaWithExecutionEffects)[executionEffectsKey] ?? conservativeExecutionEffects",
          )

          replace(
              'packages/internal/src/core/core.ts',
              """\treturn {\n\t\tget: (target: any, p: PropertyKey, receiver: any) => {\n\t\t\tif (Object.hasOwn(stepMethods, p) === false)\n""",
              """\treturn {\n\t\tget: (target: any, p: PropertyKey, receiver: any) => {\n\t\t\tif (p === executionEffectsKey)\n\t\t\t\treturn executionEffects\n\t\t\tif (Object.hasOwn(stepMethods, p) === false)\n""",
          )
          replace(
              'packages/internal/src/core/core.ts',
              """function createCoreProperties(\n\truntimeSteps: RuntimeStep[],\n\texecuteRaw: PipeExecutor,\n\toperationMode: RuntimeOperationMode,\n\texecutionEffects: ExecutionEffects,\n) {\n""",
              """function createCoreProperties(\n\truntimeSteps: RuntimeStep[],\n\texecuteRaw: PipeExecutor,\n\toperationMode: RuntimeOperationMode,\n) {\n""",
          )
          replace(
              'packages/internal/src/core/core.ts',
              """\t\t\truntimeSteps,\n\t\t\toperationMode: OPERATION_MODES[operationMode],\n\t\t\t[executionEffectsKey]: executionEffects,\n""",
              """\t\t\truntimeSteps,\n\t\t\toperationMode: OPERATION_MODES[operationMode],\n""",
          )
          replace(
              'packages/internal/src/core/core.ts',
              """\tconst coreProperties = createCoreProperties(\n\t\tcurrentRuntimeSteps,\n\t\texecuteRaw,\n\t\tcurrentOperationMode,\n\t\tcurrentExecutionEffects,\n\t)\n""",
              """\tconst coreProperties = createCoreProperties(\n\t\tcurrentRuntimeSteps,\n\t\texecuteRaw,\n\t\tcurrentOperationMode,\n\t)\n""",
          )
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/agent-phase-a-virtual-effects.yml
          git add packages/internal/src/core
          git commit -m "perf: virtualize execution effect metadata"
          git push