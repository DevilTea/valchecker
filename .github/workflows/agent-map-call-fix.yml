name: Agent Map call fix

on:
  push:
    branches:
      - agent/map-lazy-output
    paths:
      - .github/scripts/agent-map-call-fix.py
      - .github/workflows/agent-map-call-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/map-lazy-output
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply review fix
        run: python .github/scripts/agent-map-call-fix.py
      - name: Remove temporary helper and push
        run: |
          rm .github/scripts/agent-map-call-fix.py
          rm .github/workflows/agent-map-call-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/internal/src/steps/map/map.ts packages/internal/src/steps/map/lazy-output.test.ts .github
          git commit -m "fix: preserve Map snapshot call semantics"
          git push origin HEAD:agent/map-lazy-output
