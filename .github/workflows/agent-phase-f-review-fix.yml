name: Agent Phase F Review Fix

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/execution-effect-metadata'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Fix trait argument indentation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/internal/src/core/core.ts')
          text = path.read_text()
          old = "\t\t\t\t\tregisteredStepMethod.defaultOperationMode,\n\t\t\t\tregisteredStepMethod.identityRuntimeSteps,\n\t\t\t\t)"
          new = "\t\t\t\t\tregisteredStepMethod.defaultOperationMode,\n\t\t\t\t\tregisteredStepMethod.identityRuntimeSteps,\n\t\t\t\t)"
          if text.count(old) != 1:
              raise RuntimeError(f'expected one indentation target, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
          git rm .github/workflows/agent-phase-f-review-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style: align runtime trait argument"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
