name: Benchmark Full One Shot

on:
  pull_request:
    paths:
      - .github/workflows/benchmark-full-one-shot.yml

permissions:
  contents: read

concurrency:
  group: benchmark-full-one-shot-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Valchecker
        run: pnpm build

      - name: Install Benchmark Dependencies
        run: pnpm --dir benchmarks install --ignore-workspace --lockfile=false --ignore-scripts

      - name: Verify All Benchmark Scenarios
        run: pnpm --dir benchmarks verify

      - name: Run Full Benchmark
        shell: bash
        run: |
          mkdir -p artifacts/benchmark
          pnpm --dir benchmarks bench \
            --mode full \
            --adapters valchecker,zod3,zod4,zod4-jitless,valibot \
            --seed "post-core-optimization-${GITHUB_SHA}" \
            --output ../artifacts/benchmark/raw.json

      - name: Generate Reports
        run: pnpm --dir benchmarks report --input ../artifacts/benchmark/raw.json --markdown ../artifacts/benchmark/report.md --html ../artifacts/benchmark/report.html

      - name: Publish Job Summary
        shell: bash
        run: cat artifacts/benchmark/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Benchmark Reports
        if: always() && hashFiles('artifacts/benchmark/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-full-post-core-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/benchmark
          if-no-files-found: error
          retention-days: 90
