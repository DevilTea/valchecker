name: Agent Phase F Prune Traits

on:
  push:
    branches: [agent/execution-effect-metadata]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/execution-effect-metadata
          repository: DevilTea/valchecker
          show-progress: false
      - name: Remove unreachable identity wrappers
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          path = Path('packages/internal/src/core/core.ts')
          text = path.read_text()
          pattern = r"\t\tif \(identityRuntimeSteps\) \{[\s\S]*?\n\t\t\}\n\n\t\tif \(operationMode === RUNTIME_OPERATION_MODE_SYNC\) \{"
          replacement = """\t\tif (identityRuntimeSteps) {
\t\t\treturn function identityRuntimeStep(lastResult) {
\t\t\t\ttry {
\t\t\t\t\treturn fn(lastResult) as ExecutionResult
\t\t\t\t}
\t\t\t\tcatch (error) {
\t\t\t\t\treturn createUnknownExceptionFailure(method, lastResult, error, resolveMessage)
\t\t\t\t}
\t\t\t}
\t\t}

\t\tif (operationMode === RUNTIME_OPERATION_MODE_SYNC) {"""
          text, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              raise RuntimeError(f'expected one identity wrapper block, found {count}')
          path.write_text(text)
          PY
          git rm .github/workflows/agent-phase-f-prune-traits.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: remove unreachable identity wrappers"
          git push origin HEAD:agent/execution-effect-metadata
