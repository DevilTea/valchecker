name: Agent apply PR B alias coverage test

on:
  push:
    branches:
      - agent/structural-combinator-failure-semantics
    paths:
      - .github/workflows/agent-apply-prb-fix8.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structural-combinator-failure-semantics
          fetch-depth: 0

      - name: Apply merged-reference alias coverage test
        shell: bash
        run: |
          printf '%s  %s\n' \
            '6225e2d6f6a69820edd4ea493329ae397c388decab6806483169f8edcaee0ca6' \
            '.github/agent/prb-fix8.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode .github/agent/prb-fix8.patch.gz.b64 > /tmp/prb-fix8.patch.gz
          gunzip -c /tmp/prb-fix8.patch.gz > /tmp/prb-fix8.patch
          printf '%s  %s\n' \
            'fcc233ce32c52b762ca7dc6ee534b7853c1428979019a850f59145dfa31c8ef0' \
            '/tmp/prb-fix8.patch' \
            | sha256sum --check --strict
          git apply --index /tmp/prb-fix8.patch
          rm -f \
            .github/agent/prb-fix8.patch.gz.b64 \
            .github/workflows/agent-apply-prb-fix8.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test: cover merged-reference alias conflicts'
          git push origin HEAD:agent/structural-combinator-failure-semantics
