name: Probe Typecheck Baseline

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  Probe:
    if: github.head_ref == 'agent/standardize-step-options-v2'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options-v2
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Typecheck current branch before codemod
        shell: bash
        run: |
          set +e
          pnpm install --frozen-lockfile > branch-install.log 2>&1
          pnpm typecheck > branch-typecheck.log 2>&1
          echo $? > branch-status.txt

      - name: Typecheck main with same environment
        shell: bash
        run: |
          set +e
          git worktree add /tmp/valchecker-main origin/main
          cd /tmp/valchecker-main
          pnpm install --frozen-lockfile > "$GITHUB_WORKSPACE/main-install.log" 2>&1
          pnpm typecheck > "$GITHUB_WORKSPACE/main-typecheck.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/main-status.txt"

      - name: Upload baseline comparison
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: typecheck-baseline-probe
          path: |
            branch-install.log
            branch-typecheck.log
            branch-status.txt
            main-install.log
            main-typecheck.log
            main-status.txt
          if-no-files-found: error
          retention-days: 7

      - name: Report result
        run: |
          echo "branch=$(cat branch-status.txt)"
          echo "main=$(cat main-status.txt)"
          test "$(cat main-status.txt)" = "0"
