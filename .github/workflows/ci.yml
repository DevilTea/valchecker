name: Diagnose Step Options Migration

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  Diagnose:
    if: github.head_ref == 'agent/standardize-step-options-v2'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options-v2
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply and inspect migration
        shell: bash
        run: |
          set +e
          pnpm build > migration-build.log 2>&1
          build_status=$?

          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('package.json')
          data = json.loads(path.read_text())
          data['scripts']['build'] = "pnpm -r --filter='./packages/*' build"
          path.write_text(json.dumps(data, ensure_ascii=False, indent='\t') + '\n')
          PY
          rm -f scripts/generate-step-option-call-migration.ts
          rm -rf artifacts/step-option-call-migration
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml

          pnpm lint:fix > lint-fix.log 2>&1
          lint_status=$?

          mkdir -p artifacts/finalize-diagnostics
          cp migration-build.log lint-fix.log artifacts/finalize-diagnostics/
          git diff -- . ':(exclude).github/workflows/ci.yml' > artifacts/finalize-diagnostics/migrated.patch
          git ls-files -z | tar --null -czf artifacts/finalize-diagnostics/tracked-worktree.tar.gz -T -
          printf 'build_status=%s\nlint_status=%s\n' "$build_status" "$lint_status" > artifacts/finalize-diagnostics/status.txt

          if [[ "$build_status" -ne 0 || "$lint_status" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload diagnostics
        if: always() && hashFiles('artifacts/finalize-diagnostics/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: finalize-diagnostics
          path: artifacts/finalize-diagnostics
          if-no-files-found: error
          retention-days: 7
