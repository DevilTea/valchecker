name: Finalize Step Options Migration

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  Finalize:
    if: github.head_ref == 'agent/standardize-step-options-v2'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options-v2
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply call-site and native-call migration
        run: pnpm build

      - name: Normalize generated call syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in Path('.').rglob('*'):
              if not path.is_file() or path.suffix not in {'.ts', '.tsx', '.mts', '.cts', '.md'}:
                  continue
              source = path.read_text()
              normalized = source.replace('[],, message:', '[], message:')
              if normalized != source:
                  path.write_text(normalized)
          PY

      - name: Remove migration scaffolding
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('package.json')
          data = json.loads(path.read_text())
          data['scripts']['build'] = "pnpm -r --filter='./packages/*' build"
          path.write_text(json.dumps(data, ensure_ascii=False, indent='\t') + '\n')
          PY
          rm -f scripts/generate-step-option-call-migration.ts
          rm -rf artifacts/step-option-call-migration
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Record public API
        run: |
          pnpm build
          pnpm api:surface:update

      - name: Validate migrated repository
        run: |
          pnpm test:quality
          pnpm typecheck
          pnpm test
          pnpm docs:build
          pnpm --dir benchmarks install --ignore-workspace --lockfile=false --ignore-scripts
          pnpm --dir benchmarks verify
          git diff --check

      - name: Squash migration history and push
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset --soft origin/main
          git add -A
          git commit -m "refactor!: standardize built-in step options"
          git push --force origin HEAD:agent/standardize-step-options-v2
