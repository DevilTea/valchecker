name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  Check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: API Surface
        run: pnpm api:surface

      - name: Upload API Surface Diff
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-surface-actual
          path: artifacts
          if-no-files-found: error
          retention-days: 7

      - name: Publint
        run: pnpm publint

      - name: Package Smoke Test
        run: pnpm test:package

      - name: Lint
        run: pnpm lint 2>&1 | tee lint.log

      - name: Upload Lint Log
        if: failure() && hashFiles('lint.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lint-log
          path: lint.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Typecheck
        run: pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload Typecheck Log
        if: failure() && hashFiles('typecheck.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: typecheck-log
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 7

  Docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Build Documentation
        run: pnpm docs:build

  Release-Artifacts:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Setup npm for Trusted Publishing
        run: npm install --global npm@11.5.1

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Prepare Release Tarballs
        run: pnpm release:prepare

      - name: Verify Publish Inputs
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          version_without_build="${version%%+*}"
          if [[ "$version_without_build" == *-* ]]; then
            tag="next"
          else
            tag="latest"
          fi
          RELEASE_VERSION="$version" \
          NPM_TAG="$tag" \
          PUBLISH_CONFIRMATION="publish $version to $tag" \
          pnpm release:publish --verify-only

      - name: Upload Release Tarballs
        if: always() && hashFiles('artifacts/release/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-tarballs
          path: artifacts/release
          if-no-files-found: error
          retention-days: 14

  Benchmark-Smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Valchecker
        run: pnpm build

      - name: Install Benchmark Dependencies
        run: pnpm --dir benchmarks install --ignore-workspace --lockfile=false --ignore-scripts

      - name: Verify All Benchmark Scenarios
        run: pnpm --dir benchmarks verify

      - name: Benchmark and Report Smoke
        env:
          BENCHMARK_SEED: ci-smoke
        run: pnpm --dir benchmarks smoke

      - name: Upload Benchmark Smoke Reports
        if: always() && hashFiles('artifacts/benchmark-smoke/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-smoke
          path: artifacts/benchmark-smoke
          if-no-files-found: error
          retention-days: 7

  Coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Coverage
        run: pnpm test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error
          retention-days: 14

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node: [22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
