name: Diagnose P0 Generation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  Diagnose:
    if: github.head_ref == 'agent/add-p0-steps'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/add-p0-steps
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate steps and documentation
        run: python scripts/apply-p0-steps.py

      - name: Format changed files
        shell: bash
        run: |
          set -o pipefail
          pnpm exec eslint --fix \
            packages/internal/src/steps/isDefined \
            packages/internal/src/steps/isEqualTo \
            packages/internal/src/steps/isGreaterThan \
            packages/internal/src/steps/isIncluding \
            packages/internal/src/steps/isLengthExactly \
            packages/internal/src/steps/isLessThan \
            packages/internal/src/steps/isMatching \
            packages/internal/src/steps/isMultipleOf \
            packages/internal/src/steps/isNonNull \
            packages/internal/src/steps/isNonNullish \
            packages/internal/src/steps/isOneOf \
            packages/internal/src/steps/isSafeInteger \
            packages/internal/src/steps/toMapped \
            packages/internal/src/steps/toNormalized \
            packages/internal/src/steps/index.ts \
            README.md CHANGELOG.md docs/api/overview.md docs/api/primitives.md docs/api/transforms.md \
            2>&1 | tee p0-lint.log

      - name: Upload lint diagnostics
        if: always() && hashFiles('p0-lint.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: p0-generation-lint
          path: p0-lint.log
          if-no-files-found: error
          retention-days: 7
