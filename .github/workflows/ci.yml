name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  Finalize-Step-Options-Migration:
    if: github.head_ref == 'agent/standardize-step-options'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format migrated source
        run: pnpm lint:fix

      - name: Rebuild and record API surface
        run: |
          pnpm build
          pnpm api:surface:update

      - name: Restore permanent CI
        run: git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Commit finalized migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: finalize step options migration"
          git push origin HEAD:agent/standardize-step-options
