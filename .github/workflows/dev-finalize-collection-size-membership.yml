name: Dev Finalize Collection Size Membership

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build && pnpm api:surface:update
      - name: Update public documentation and tree-shaking contracts
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new))

          replace_once(
              'docs/api/structures.md',
              """The enclosing `message` on `map()` and the options message on `set()` participate in normal structure message resolution for both owned and nested child issues after their collection paths are prepended.

          ## `union(branches)`
          """.replace('          ', ''),
              """The enclosing `message` on `map()` and the options message on `set()` participate in normal structure message resolution for both owned and nested child issues after their collection paths are prepended.

          ### Collection size and membership

          Map and Set outputs expose `isEmpty()`, `isNotEmpty()`, `isSizeAtLeast()`, `isSizeAtMost()`, `isSizeExactly()`, and `toSize()`. Size-validation failures snapshot the single observed `size` value. Existing string and array emptiness failures retain their `length` payloads.

          Set membership uses `isIncluding(item)`. Map membership is explicit about the searched domain through `isIncludingKey(key)` and `isIncludingValue(value)`. All three membership forms use SameValueZero equality, so `NaN` matches `NaN` and `0` matches `-0`.

          ```ts
          const tags = v.set(v.string())
          \t.isNotEmpty()
          \t.isSizeAtMost(5)
          \t.isIncluding('required')

          const scores = v.map({ key: v.string(), value: v.number() })
          \t.isIncludingKey('primary')
          \t.isIncludingValue(1)
          \t.toSize()
          ```

          ## `union(branches)`
          """.replace('          ', ''),
          )

          replace_once(
              'docs/api/transforms.md',
              """### `toLength()`

          Replaces a length-bearing value with its numeric length.

          ## JSON transforms
          """.replace('          ', ''),
              """### `toLength()`

          Replaces a length-bearing value with its numeric length.

          ### `toSize()`

          Replaces a size-bearing value such as a Map or Set with its numeric size. This pure transformation emits no issue.

          ## JSON transforms
          """.replace('          ', ''),
          )

          replace_once(
              'README.md',
              """Collection child schemas run in insertion order and return new transformed collections. Map key/value failures use `[index, 'key']` and `[index, 'value']`; Set item failures use `[index]`. Transformed Map keys and Set items must remain unique under SameValueZero, so validation fails rather than silently losing data.

          ## Composition
          """.replace('          ', ''),
              """Collection child schemas run in insertion order and return new transformed collections. Map key/value failures use `[index, 'key']` and `[index, 'value']`; Set item failures use `[index]`. Transformed Map keys and Set items must remain unique under SameValueZero, so validation fails rather than silently losing data.

          ```ts
          const requiredTags = tags
          \t.isNotEmpty()
          \t.isSizeAtMost(5)
          \t.isIncluding('required')

          const scoreCount = scores
          \t.isIncludingKey('primary')
          \t.isIncludingValue(1)
          \t.toSize()
          ```

          ## Composition
          """.replace('          ', ''),
          )

          replace_once(
              'packages/valchecker/README.md',
              """Both initial schemas preserve insertion order, return new transformed collections, and expose stable child paths. Duplicate transformed Set items or Map keys are validation failures rather than silent data loss.

          ## Step naming
          """.replace('          ', ''),
              """Both initial schemas preserve insertion order, return new transformed collections, and expose stable child paths. Duplicate transformed Set items or Map keys are validation failures rather than silent data loss.

          Map and Set schemas also expose size-aware emptiness checks, `isSizeAtLeast()`, `isSizeAtMost()`, `isSizeExactly()`, and `toSize()`. Set membership uses `isIncluding()`, while Map membership is explicit through `isIncludingKey()` and `isIncludingValue()`.

          ## Step naming
          """.replace('          ', ''),
          )

          replace_once(
              'CHANGELOG.md',
              """- `map()` and `set()` initial schemas with insertion-ordered child validation and transformation, stable collection paths, sync/maybe-async preservation, and explicit transformed-key/item collision diagnostics.
          """.replace('          ', ''),
              """- Map and Set size/membership steps: size-aware `isEmpty()`/`isNotEmpty()`, `isSizeAtLeast()`, `isSizeAtMost()`, `isSizeExactly()`, `toSize()`, Set `isIncluding()`, and Map `isIncludingKey()`/`isIncludingValue()`.
          - `map()` and `set()` initial schemas with insertion-ordered child validation and transformation, stable collection paths, sync/maybe-async preservation, and explicit transformed-key/item collision diagnostics.
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\tscenario('valchecker-map-set-selective', 'Valchecker', 'Selective Map and Set schemas', 'Map and Set isolation', `
          import { createValchecker, map, number, set, string } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string] })
          export const mapSchema = v.map({ key: v.string(), value: v.number() })
          export const setSchema = v.set(v.string())
          export const result = {
          \tmap: mapSchema.execute(new Map([['a', 1]])),
          \tset: setSchema.execute(new Set(['a'])),
          }
          `, {
          \t\trequiredMarkers: ['map:expected_map', 'map:duplicate_transformed_key', 'set:expected_set', 'set:duplicate_transformed_item'],
          \t}),
          \t...[
          """.replace('          ', ''),
              """\tscenario('valchecker-map-set-selective', 'Valchecker', 'Selective Map and Set schemas', 'Map and Set isolation', `
          import { createValchecker, map, number, set, string } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string] })
          export const mapSchema = v.map({ key: v.string(), value: v.number() })
          export const setSchema = v.set(v.string())
          export const result = {
          \tmap: mapSchema.execute(new Map([['a', 1]])),
          \tset: setSchema.execute(new Set(['a'])),
          }
          `, {
          \t\trequiredMarkers: ['map:expected_map', 'map:duplicate_transformed_key', 'set:expected_set', 'set:duplicate_transformed_item'],
          \t}),
          \tscenario('valchecker-collection-capabilities-free', 'Valchecker', 'Collections without size and membership plugins', 'Collection capability isolation', `
          import { createValchecker, map, number, set, string } from 'valchecker'
          const v = createValchecker({ steps: [map, number, set, string] })
          export const result = {
          \tmap: v.map({ key: v.string(), value: v.number() }).execute(new Map([['a', 1]])),
          \tset: v.set(v.string()).execute(new Set(['a'])),
          }
          `, {
          \t\tforbiddenMarkers: ['isSizeAtLeast:expected_size_at_least', 'isSizeAtMost:expected_size_at_most', 'isSizeExactly:expected_size_exactly', 'isIncludingKey:expected_including_key', 'isIncludingValue:expected_including_value'],
          \t}),
          \tscenario('valchecker-collection-capabilities', 'Valchecker', 'Selective collection size and membership', 'Collection capability isolation', `
          import { createValchecker, isIncluding, isIncludingKey, isIncludingValue, isSizeAtLeast, isSizeAtMost, isSizeExactly, map, number, set, string, toSize } from 'valchecker'
          const v = createValchecker({ steps: [isIncluding, isIncludingKey, isIncludingValue, isSizeAtLeast, isSizeAtMost, isSizeExactly, map, number, set, string, toSize] })
          export const result = {
          \tmap: v.map({ key: v.string(), value: v.number() }).isSizeAtLeast(1).isIncludingKey('a').isIncludingValue(1).toSize().execute(new Map([['a', 1]])),
          \tset: v.set(v.string()).isSizeAtMost(2).isSizeExactly(1).isIncluding('a').execute(new Set(['a'])),
          }
          `, {
          \t\trequiredMarkers: ['isSizeAtLeast:expected_size_at_least', 'isSizeAtMost:expected_size_at_most', 'isSizeExactly:expected_size_exactly', 'isIncludingKey:expected_including_key', 'isIncludingValue:expected_including_value'],
          \t}),
          \t...[
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\tconst collectionFree = byId(results, 'valchecker-collection-free')
          \tconst mapSetSelective = byId(results, 'valchecker-map-set-selective')
          \tconst comparisons = [
          """.replace('          ', ''),
              """\tconst collectionFree = byId(results, 'valchecker-collection-free')
          \tconst mapSetSelective = byId(results, 'valchecker-map-set-selective')
          \tconst collectionCapabilitiesFree = byId(results, 'valchecker-collection-capabilities-free')
          \tconst collectionCapabilities = byId(results, 'valchecker-collection-capabilities')
          \tconst comparisons = [
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\tconst collectionMarkersAbsent = collectionFree.retainedForbiddenMarkers.length === 0
          \tconst collectionMarkersPresent = mapSetSelective.retainedRequiredMarkers.length === mapSetSelective.requiredMarkers.length
          \tconst checks = [
          """.replace('          ', ''),
              """\tconst collectionMarkersAbsent = collectionFree.retainedForbiddenMarkers.length === 0
          \tconst collectionMarkersPresent = mapSetSelective.retainedRequiredMarkers.length === mapSetSelective.requiredMarkers.length
          \tconst collectionCapabilityMarkersAbsent = collectionCapabilitiesFree.retainedForbiddenMarkers.length === 0
          \tconst collectionCapabilityMarkersPresent = collectionCapabilities.retainedRequiredMarkers.length === collectionCapabilities.requiredMarkers.length
          \tconst checks = [
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\t\t{ name: 'Selective Map and Set schemas retain every collection issue marker', passed: collectionMarkersPresent, value: collectionMarkersPresent ? mapSetSelective.retainedRequiredMarkers.join(', ') : `${mapSetSelective.retainedRequiredMarkers.length}/${mapSetSelective.requiredMarkers.length} retained` },
          \t]
          """.replace('          ', ''),
              """\t\t{ name: 'Selective Map and Set schemas retain every collection issue marker', passed: collectionMarkersPresent, value: collectionMarkersPresent ? mapSetSelective.retainedRequiredMarkers.join(', ') : `${mapSetSelective.retainedRequiredMarkers.length}/${mapSetSelective.requiredMarkers.length} retained` },
          \t\t{ name: 'Collections without size/membership plugins exclude their issue markers', passed: collectionCapabilityMarkersAbsent, value: collectionCapabilityMarkersAbsent ? 'none retained' : collectionCapabilitiesFree.retainedForbiddenMarkers.join(', ') },
          \t\t{ name: 'Selective collection size/membership retains every issue marker', passed: collectionCapabilityMarkersPresent, value: collectionCapabilityMarkersPresent ? collectionCapabilities.retainedRequiredMarkers.join(', ') : `${collectionCapabilities.retainedRequiredMarkers.length}/${collectionCapabilities.requiredMarkers.length} retained` },
          \t]
          """.replace('          ', ''),
          )

          replace_once(
              'benchmarks/src/treeshake.mjs',
              """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation', 'Full-library reference']
          """.replace('          ', ''),
              """\t\t: ['Minimal string pipeline', 'Object schema', 'Union shorthand isolation', 'Map and Set isolation', 'Collection capability isolation', 'Full-library reference']
          """.replace('          ', ''),
          )
          PY
      - run: rm -f .github/workflows/dev-finalize-collection-size-membership.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'docs: finalize collection size and membership contracts'
          git push origin HEAD:${{ github.head_ref }}
