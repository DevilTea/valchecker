name: Cleanup Step Options Documentation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  Cleanup:
    if: github.head_ref == 'agent/standardize-step-options'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options
          fetch-depth: 0

      - name: Clean duplicated documentation
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          conventions_path = Path('.github/skills/valchecker-dev/references/conventions.md')
          conventions = conventions_path.read_text()
          start = conventions.index('## Step parameters\n')
          end = conventions.index('## Issue codes\n', start)
          canonical = '''## Step parameters

          Message-bearing built-in steps use one consistent parameter contract:

          - a single required semantic operand may remain positional;
          - every optional configuration field and the step message belong to one trailing options object;
          - a step with no required operand accepts only an optional options object;
          - a step that already requires a named configuration object includes `message` in that same object;
          - direct positional messages are forbidden.

          Examples:

          ```ts
          v.number().isAtLeast(0, { message: 'Expected a non-negative number.' })
          v.number().isFinite({ message: 'Expected a finite number.' })
          v.array(v.string()).toFiltered(predicate, { thisArg, message })
          v.array(v.number()).toSorted({ compareFn, message })
          ```

          Built-in step definitions are checked by `pnpm test:quality`; new optional positional parameters or direct `MessageHandler` parameters fail CI. Steps without message support may preserve a native positional signature when it is semantically clearer.

          '''
          canonical = '\n'.join(line.removeprefix('          ') for line in canonical.splitlines())
          conventions_path.write_text(conventions[:start] + canonical + conventions[end:])

          agents_path = Path('AGENTS.md')
          agents = agents_path.read_text()
          agents = agents.replace(
              'Message-bearing steps keep at most one required semantic operand positional. All optional configuration and `message` belong to one trailing options object; direct positional messages are forbidden.\n- message-bearing steps keep one required operand positional and place all optional configuration plus `message` in one trailing options object; direct positional messages are forbidden;\n',
              'Message-bearing steps keep at most one required semantic operand positional. All optional configuration and `message` belong to one trailing options object; direct positional messages are forbidden.\n',
          )
          agents_path.write_text(agents)

          migration_path = Path('MIGRATION.md')
          migration = migration_path.read_text()
          start = migration.index('## Step messages now use options objects\n')
          end = migration.index('This guide covers breaking', start)
          canonical = '''## Step messages now use options objects

          All built-in positional message parameters have been removed before 1.0. Keep one required semantic operand positional and move the message into the trailing options object. Callback configuration such as `thisArg` and `compareFn` belongs to that object as well.

          ```ts
          // Before
          v.number().isAtLeast(0, 'Must be non-negative.')
          v.array(v.string()).toFiltered(predicate, undefined, 'Filter failed.')

          // After
          v.number().isAtLeast(0, { message: 'Must be non-negative.' })
          v.array(v.string()).toFiltered(predicate, { message: 'Filter failed.' })
          ```

          '''
          canonical = '\n'.join(line.removeprefix('          ') for line in canonical.splitlines())
          migration_path.write_text(migration[:start] + canonical + migration[end:])

          api_surface_path = Path('api-surface.json')
          api_surface = json.loads(api_surface_path.read_text())
          api_surface_path.write_text(json.dumps(api_surface, ensure_ascii=False, separators=(',', ':')) + '\n')

          Path('.github/workflows/cleanup-step-options-docs.yml').unlink()
          PY

      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit --no-verify -m "docs: clean step options migration guidance"
          git push origin HEAD:agent/standardize-step-options
