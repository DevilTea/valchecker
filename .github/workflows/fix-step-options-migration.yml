name: Fix Step Options Migration

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  Fix:
    if: github.head_ref == 'agent/standardize-step-options'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/standardize-step-options
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Repair
        shell: bash
        run: |
          set -o pipefail
          pnpm tsx scripts/fix-step-options-migration.ts 2>&1 | tee repair.log

      - name: Upload Repair Log
        if: failure() && hashFiles('repair.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: step-options-repair-log
          path: repair.log
          if-no-files-found: error
          retention-days: 7

      - name: Format Changed Files
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/main', '--'],
              text=True,
          ).splitlines()
          files = [
              name for name in changed
              if Path(name).is_file()
              and Path(name).suffix in {'.ts', '.mts', '.mjs', '.md', '.json', '.yaml', '.yml'}
          ]
          if files:
              subprocess.run(['pnpm', 'exec', 'eslint', '--fix', *files], check=False)
          PY

      - name: Refresh API Surface
        run: |
          pnpm build
          pnpm api:surface:update

      - name: Commit Repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit --no-verify -m "fix: complete step options migration"
          git push origin HEAD:agent/standardize-step-options
